<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE STAGE | HELLO MACHI SUPER SINGER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF1493;
            --secondary: #00f2ff;
            --bg-dark: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* --- METALLIC GOLD AWARD DESIGN --- */
        .trophy-container {
            position: absolute;
            top: 45%;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 2%;
            transform: translateY(-50%);
            z-index: 2;
            pointer-events: none;
        }

        .award {
            position: relative;
            width: 150px;
            height: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: rotate3D 8s infinite ease-in-out;
            perspective: 1200px;
        }

        .award-icon {
            font-size: 6rem;
            background: linear-gradient(135deg, #FFD700 0%, #FFFACD 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.4));
            margin-bottom: 15px;
            position: relative;
        }

        .award-base {
            width: 100px;
            height: 25px;
            background: linear-gradient(to bottom, #FFD700, #8B4513);
            border-radius: 5px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.2);
        }

        @keyframes rotate3D {
            0% { transform: rotateY(-20deg); }
            50% { transform: rotateY(20deg); }
            100% { transform: rotateY(-20deg); }
        }

        /* --- LOGO WATERMARK --- */
        .logo-watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            opacity: 0.05;
            z-index: 2;
            pointer-events: none;
            filter: grayscale(1);
        }

        /* --- FULL SCREEN QR OVERLAY --- */
        #qr-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 20000;
            display: none; /* Controlled by JS */
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .qr-big-box {
            background: white;
            padding: 30px;
            border-radius: 40px;
            box-shadow: 0 0 100px var(--primary);
            margin-bottom: 30px;
            transform: scale(1.2);
        }

        .qr-big-box img { width: 350px; height: 350px; }

        .qr-text {
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        /* --- STAGE WORLD (Background) --- */
        .stage-world {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000000 100%);
        }

        .spotlight {
            position: absolute;
            width: 40vw;
            height: 100vh;
            background: linear-gradient(to top, rgba(255, 20, 147, 0.15), transparent);
            top: 0;
            transform-origin: top center;
            animation: sweep 8s infinite alternate ease-in-out;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.6;
        }

        @keyframes sweep {
            from { transform: rotate(-25deg); }
            to { transform: rotate(25deg); }
        }

        .particle, .note {
            position: absolute;
            animation: float-up linear infinite;
        }

        .particle { background: var(--primary); border-radius: 50%; filter: blur(5px); opacity: 0.3; }
        .note { color: rgba(255, 255, 255, 0.4); font-size: 1.5rem; }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(1); opacity: 0; }
            50% { opacity: 0.4; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* --- MAIN STAGE LAYOUT --- */
        .stage-main {
            position: relative;
            z-index: 5;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .singer-frame {
            position: relative;
            width: clamp(250px, 60vh, 500px);
            height: clamp(250px, 60vh, 500px);
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 0 60px var(--primary);
            overflow: hidden;
            background: #222;
            z-index: 10;
        }

        .singer-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            animation: kenburns 20s infinite alternate ease-in-out;
        }

        @keyframes kenburns {
            0% { transform: scale(1); }
            100% { transform: scale(1.3); }
        }

        /* --- LOWER THIRDS (CENTERED) --- */
        .lower-thirds {
            position: absolute;
            bottom: 5%;
            width: 90%;
            max-width: 900px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(25px);
            border: 1px solid var(--primary);
            padding: 20px 40px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            z-index: 100;
        }

        .singer-info h2 { 
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 5px; 
            text-transform: uppercase;
            background: linear-gradient(to bottom, #FFD700 0%, #FFFACD 50%, #B8860B 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6));
            font-weight: 900;
        }

        .singer-info p { font-size: 1rem; color: var(--primary); letter-spacing: 5px; font-weight: 700; text-transform: uppercase; }
        .singer-place { font-size: 1rem; color: var(--secondary); letter-spacing: 3px; font-weight: 700; }

        .voting-badge {
            position: absolute;
            top: -20px;
            background: var(--primary);
            padding: 10px 30px;
            border-radius: 35px;
            font-weight: 900;
            color: white;
            font-size: 1rem;
            z-index: 101;
            animation: pulse 1.5s infinite;
            display: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255, 20, 147, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 25px rgba(255, 20, 147, 0); }
            100% { transform: scale(1); }
        }

        /* --- QR HUD (TOP RIGHT) --- */
        .qr-hud {
            position: absolute;
            right: 2%;
            top: 15%;
            text-align: center;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 20px;
            border: 2px solid var(--primary);
            backdrop-filter: blur(15px);
            z-index: 100;
            display: none;
        }

        .qr-hud img { width: 100px; height: 100px; border-radius: 8px; margin-bottom: 8px; border: 2px solid white; }
        .qr-hud p { font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; color: white; }

        /* --- AURA PULSE --- */
        .aura-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: clamp(250px, 60vh, 500px);
            height: clamp(250px, 60vh, 500px);
            border: 2px solid var(--primary);
            border-radius: 50%;
            z-index: 3;
            animation: auraExpand 3s infinite;
            opacity: 0;
        }

        @keyframes auraExpand {
            0% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
            100% { transform: translate(-50%, -50%) scale(1.5); opacity: 0; }
        }

        .flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; opacity: 0; pointer-events: none; }
        .flash.active { animation: flashEffect 0.8s ease-out; }
        @keyframes flashEffect { 0% { opacity: 1; } 100% { opacity: 0; } }

        #stage-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 10000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        /* --- TICKER CSS --- */
        .shoutout-ticker {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(0, 0, 0, 0.8);
            border-top: 2px solid var(--primary);
            padding: 10px 0;
            white-space: nowrap;
            overflow: hidden;
            z-index: 100;
        }

        .ticker-content {
            display: inline-block;
            padding-left: 100%;
            animation: ticker 30s linear infinite;
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
        }

        @keyframes ticker {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        .shoutout-item {
            display: inline-block;
            margin-right: 50px;
        }

        .shoutout-item span { color: white; margin-left: 10px; text-transform: none; font-weight: 400; }

        .enter-btn { background: var(--primary); color: white; border: none; padding: 20px 50px; font-size: 1.5rem; font-weight: 900; border-radius: 50px; cursor: pointer; box-shadow: 0 0 30px var(--primary); }

        /* --- MOBILE OVERRIDES --- */
        @media (max-width: 768px) {
            .singer-frame {
                width: 65vw;
                height: 65vw;
                margin-top: -15vh;
            }
            .lower-thirds {
                width: 92%;
                padding: 12px;
                bottom: 3%;
                border-radius: 20px;
            }
            .singer-info h2 {
                font-size: 1.6rem;
                line-height: 1.2;
            }
            .singer-info p {
                font-size: 0.7rem;
                letter-spacing: 1px;
            }
            .singer-place {
                font-size: 0.8rem;
            }
            .qr-hud {
                top: 10px;
                right: 10px;
                padding: 8px;
                transform: scale(0.8);
                transform-origin: top right;
            }
            .trophy-container {
                display: none;
            }
            .qr-big-box img {
                width: 80vw;
                height: 80vw;
            }
            .qr-text {
                font-size: 1.5rem;
            }
            #stage-overlay h1 {
                font-size: 1.5rem;
                letter-spacing: 5px;
            }
        }
    </style>
</head>
<body>

    <!-- Full Screen QR Overlay -->
    <div id="qr-overlay">
        <div class="qr-big-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://hello-machi-fm-6ebe4.web.app/vote.html" alt="Vote QR">
        </div>
        <div class="qr-text">SCAN NOW TO VOTE</div>
        <div id="qr-singer-name" style="color:var(--secondary); font-size: 1.5rem; margin-top: 10px;">FOR THE CURRENT PERFORMER</div>
    </div>

    <div id="stage-overlay">
        <h1 style="margin-bottom: 30px; letter-spacing: 10px;">HELLO MACHI STAGE</h1>
        <button class="enter-btn" onclick="startStage()">ENTER THE STAGE</button>
    </div>

    <div class="stage-world" id="stage-world">
        <img src="logo.jpg" class="logo-watermark">
        <div class="spotlight" style="left: 10%; animation-delay: 0s;"></div>
        <div class="spotlight" style="left: 45%; animation-delay: -4s; opacity: 0.4;"></div>
        <div class="spotlight" style="left: 80%; animation-delay: -2s;"></div>
    </div>

    <div class="flash" id="flash-screen"></div>

    <div class="stage-main" id="stage-ui" style="display: none;">
        <div class="trophy-container">
            <div class="award"><div class="award-icon"><i class="fa-solid fa-star"></i></div><div class="award-base"></div></div>
            <div class="award"><div class="award-icon"><i class="fa-solid fa-star"></i></div><div class="award-base"></div></div>
        </div>

        <div class="aura-pulse"></div>
        <div class="aura-pulse" style="animation-delay: 1.5s;"></div>

        <div class="singer-frame">
            <img src="logo.jpg" class="singer-img" id="singer-photo">
        </div>

        <div class="lower-thirds">
            <div class="voting-badge" id="voting-badge">VOTING OPEN</div>
            <div class="singer-info">
                <p id="current-round">LIVE PERFORMANCE</p>
                <div id="participant-id-display" style="color: white; background: rgba(255,255,255,0.1); display: inline-block; padding: 2px 10px; border-radius: 5px; font-size: 0.8rem; margin-bottom: 5px; font-family: monospace;">---</div>
                <h2 id="singer-name">HELLO MACHI FM</h2>
                <div id="singer-place" class="singer-place">SUPER SINGER SEASON 1</div>
            </div>
        </div>

        <div class="qr-hud" id="qr-hud">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=https://hello-machi-fm-6ebe4.web.app/vote.html" alt="Vote QR">
            <p>SCAN TO VOTE</p>
    </div>

    <!-- Live Shoutout Ticker -->
    <div class="shoutout-ticker">
        <div id="ticker-content" class="ticker-content">
            WELCOME TO HELLO MACHI SUPER SINGER 2026! 🎤 SEND YOUR SHOUTOUTS LIVE FROM THE PORTAL!
        </div>
    </div>

    <audio id="live-audio" src="https://azuracast.hellomachi.com/listen/hello_machi_fm/radio.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentSinger1Id = null;

        function startStage() {
            document.getElementById('stage-overlay').style.display = 'none';
            document.getElementById('stage-ui').style.display = 'flex';
            document.getElementById('live-audio').play().catch(e => console.log("Audio blocked"));
            createParticles();
            initLiveSync();
        }

        function createParticles() {
            const world = document.getElementById('stage-world');
            const notes = ['fa-music', 'fa-microphone'];
            for(let i=0; i<60; i++) {
                const isNote = Math.random() > 0.8;
                const p = document.createElement('div');
                if (isNote) {
                    p.className = 'note fa-solid ' + notes[Math.floor(Math.random() * notes.length)];
                } else {
                    p.className = 'particle';
                    p.style.width = Math.random() * 30 + 10 + 'px';
                    p.style.height = p.style.width;
                }
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 5 + 5 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                world.appendChild(p);
            }
        }

        function triggerFlash() {
            const f = document.getElementById('flash-screen');
            f.classList.remove('active');
            void f.offsetWidth;
            f.classList.add('active');
        }

        let votingWasOpen = false;

        function initLiveSync() {
            db.collection('live_state').doc('current').onSnapshot(async (doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.singer1 !== currentSinger1Id) { triggerFlash(); currentSinger1Id = data.singer1; }
                    
                    document.getElementById('current-round').textContent = data.round || 'LIVE PERFORMANCE';
                    document.getElementById('voting-badge').style.display = data.votingOpen ? 'block' : 'none';
                    document.getElementById('qr-hud').style.display = data.votingOpen ? 'block' : 'none';

                    // Full Screen QR Logic
                    if (data.votingOpen && !votingWasOpen) {
                        const overlay = document.getElementById('qr-overlay');
                        overlay.style.display = 'flex';
                        setTimeout(() => { overlay.style.display = 'none'; }, 7000); // Hide after 7 seconds
                    }
                    votingWasOpen = data.votingOpen;

                    if (data.singer1) {
                        const sSnap = await db.collection('participants').doc(data.singer1).get();
                        if (sSnap.exists) {
                            const s = sSnap.data();
                            const name = s.name.toUpperCase();
                            document.getElementById('singer-name').textContent = name;
                            document.getElementById('qr-singer-name').textContent = `FOR ${name}`;
                            document.getElementById('singer-place').textContent = s.place ? `FROM ${s.place.toUpperCase()}` : "LIVE PARTICIPANT";
                            document.getElementById('participant-id-display').textContent = s.participantId || '---';
                            if (s.photoBase64) document.getElementById('singer-photo').src = s.photoBase64;
                        }
                    } else {
                        document.getElementById('singer-name').textContent = "STAY TUNED";
                        document.getElementById('singer-place').textContent = "NEXT PERFORMER COMING UP";
                        document.getElementById('singer-photo').src = "logo.jpg";
                    }
                }
            });
            // Listen to Shoutouts
            db.collection('shoutouts').orderBy('timestamp', 'desc').limit(10).onSnapshot(snap => {
                let tickerHtml = '';
                snap.forEach(doc => {
                    const data = doc.data();
                    tickerHtml += `<div class="shoutout-item">TO ${data.to}: <span>${data.message}</span></div>`;
                });
                if (tickerHtml) {
                    document.getElementById('ticker-content').innerHTML = tickerHtml + " &nbsp; &bull; &nbsp; " + tickerHtml;
                }
            });
        }
    </script>
</body>
</html>
