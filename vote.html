<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOTE NOW | Hello Machi FM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #FF1493;
            --secondary: #C71585;
            --bg-card: #12121c;
            --glass-border: rgba(255,255,255,0.1);
            --text-muted: #888;
        }

        body {
            background: #050508;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .vote-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            margin-top: 20px;
            position: relative;
            overflow: hidden;
        }

        .singer-preview {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
            background: #000;
        }

        h2 { color: var(--primary); margin: 10px 0; font-size: 1.8rem; font-weight: 800; }

        .score-buttons {
            display: grid;
            grid-template-columns: repeat(5, 2fr);
            gap: 10px;
            margin: 25px 0;
        }

        .score-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: white;
            padding: 15px 0;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .score-btn.active {
            background: var(--primary);
            color: black;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        #submit-vote {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #submit-vote:disabled { opacity: 0.5; cursor: not-allowed; }

        .voted-msg {
            color: #00E676;
            font-weight: 800;
            display: none;
            margin-top: 20px;
            font-size: 1.2rem;
        }

        .vote-card.voted .score-buttons,
        .vote-card.voted #submit-vote,
        .vote-card.voted p {
            display: none;
        }

        .vote-card.voted .voted-msg {
            display: block;
        }

        /* Duet Selector Styles */
        .singer-selector {
            display: none;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            justify-content: center;
        }

        .sel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.4;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 100px;
        }

        .sel-item.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .sel-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid transparent;
            object-fit: cover;
            background: #000;
            margin-bottom: 8px;
        }

        .active .sel-img {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 20, 147, 0.5);
        }

        .sel-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>

    <div id="loading-overlay" style="position:fixed; inset:0; background:#050508; z-index:1000; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:20px;">
        <i class="fa-solid fa-spinner fa-spin" style="font-size:3rem; color:var(--primary);"></i>
        <p style="letter-spacing:2px; font-weight:800; color:#444;">SYNCING STAGE...</p>
    </div>

    <div id="admin-debug" style="display:none; position:fixed; top:0; width:100%; background:rgba(255,255,255,0.05); padding:5px; font-size:0.6rem; color:#555; text-align:center; z-index:2000;">
        DEBUG: <span id="debug-status">-</span> | V1: <span id="debug-v1">-</span> | V2: <span id="debug-v2">-</span>
    </div>

    <img src="logo.jpg" style="width: 80px; border-radius: 12px; margin-bottom: 20px; object-fit: contain; background: #000; z-index: 10;">
    
    <div id="live-voting-area" style="display:none; width: 100%; flex-direction:column; align-items:center;">
        <!-- Duet Selector -->
        <div class="singer-selector" id="singer-selector">
            <div class="sel-item active" id="sel-item-1" onclick="switchSinger(1)">
                <img id="sel-img-1" src="logo.jpg" class="sel-img">
                <div id="sel-name-1" class="sel-name">Singer 1</div>
            </div>
            <div class="sel-item" id="sel-item-2" onclick="switchSinger(2)">
                <img id="sel-img-2" src="logo.jpg" class="sel-img">
                <div id="sel-name-2" class="sel-name">Singer 2</div>
            </div>
        </div>

        <div class="vote-card">
            <img id="vote-singer-img" src="logo.jpg" class="singer-preview">
            <h3 style="margin:0; opacity:0.7; font-size: 0.8rem; letter-spacing: 2px;">VOTING FOR</h3>
            <h2 id="vote-singer-name">...</h2>
            
            <p style="margin-top:20px; font-size:0.9rem; color:var(--text-muted);">Rate this performance from 1 to 10</p>
            
            <div class="score-buttons" id="score-container">
                <button class="score-btn" onclick="selectScore(1)">1</button>
                <button class="score-btn" onclick="selectScore(2)">2</button>
                <button class="score-btn" onclick="selectScore(3)">3</button>
                <button class="score-btn" onclick="selectScore(4)">4</button>
                <button class="score-btn" onclick="selectScore(5)">5</button>
                <button class="score-btn" onclick="selectScore(6)">6</button>
                <button class="score-btn" onclick="selectScore(7)">7</button>
                <button class="score-btn" onclick="selectScore(8)">8</button>
                <button class="score-btn" onclick="selectScore(9)">9</button>
                <button class="score-btn" onclick="selectScore(10)">10</button>
            </div>

            <button id="submit-vote" onclick="castVote()">SUBMIT VOTE</button>
            <div id="voted-msg" class="voted-msg"><i class="fa-solid fa-circle-check"></i> VOTE RECEIVED!</div>
        </div>
    </div>

    <div id="no-live-area" style="text-align:center; margin-top:50px; display: none;">
        <i class="fa-solid fa-microphone-slash" style="font-size:3rem; color:var(--text-muted); margin-bottom:20px;"></i>
        <h2 style="color: white; opacity: 0.5;">VOTING CLOSED</h2>
        <p style="color:var(--text-muted);">Stay tuned to the broadcast.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentScore = 0;
        let activeSingerId = null;
        let singer1Data = null;
        let singer2Data = null;
        let activeIdx = 1;
        let voterId = localStorage.getItem('voter_id') || ('V' + Math.floor(Math.random() * 1000000));
        localStorage.setItem('voter_id', voterId);

        const loadingOverlay = document.getElementById('loading-overlay');
        const votingArea = document.getElementById('live-voting-area');
        const noLiveArea = document.getElementById('no-live-area');

        // 1. Listen to Live State
        db.collection('live_state').doc('current').onSnapshot(async doc => {
            try {
                if (!doc.exists) {
                    showVotingClosed("State doc missing");
                    return;
                }
                const state = doc.data();
                
                // Debug info for admin
                const debug = document.getElementById('admin-debug');
                if (localStorage.getItem('ss_admin_mode')) {
                    debug.style.display = 'block';
                    document.getElementById('debug-status').textContent = state.status;
                    document.getElementById('debug-v1').textContent = state.votingOpen1;
                    document.getElementById('debug-v2').textContent = state.votingOpen2;
                }

                const v1Open = state.status === 'on-air' && state.votingOpen1 && state.singer1;
                const v2Open = state.status === 'on-air' && state.votingOpen2 && state.singer2;

                if (v1Open || v2Open) {
                    // Fetch singer data if needed
                    if (state.singer1 && (!singer1Data || singer1Data.id !== state.singer1)) {
                        singer1Data = await loadSingerInfo(state.singer1);
                    }
                    if (state.singer2 && (!singer2Data || singer2Data.id !== state.singer2)) {
                        singer2Data = await loadSingerInfo(state.singer2);
                    } else if (!state.singer2) {
                        singer2Data = null;
                    }

                    // Handle Duet Selector Visibility
                    const selector = document.getElementById('singer-selector');
                    if (v1Open && v2Open) {
                        selector.style.display = 'flex';
                        updateSelectorItem(1, singer1Data, true);
                        updateSelectorItem(2, singer2Data, true);
                    } else {
                        selector.style.display = 'none';
                    }

                    // Auto-determine which singer to show
                    if (v1Open && v2Open) {
                        if (!activeSingerId) switchSinger(1);
                        else updateCurrentSingerDisplay();
                    } else if (v1Open) {
                        switchSinger(1);
                    } else if (v2Open) {
                        switchSinger(2);
                    }

                    votingArea.style.display = 'flex';
                    noLiveArea.style.display = 'none';
                    loadingOverlay.style.display = 'none';

                } else {
                    showVotingClosed("Closed by Admin");
                }
            } catch (err) {
                console.error("Snapshot error:", err);
                loadingOverlay.innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
            }
        }, err => {
            console.error("Firebase error:", err);
            loadingOverlay.innerHTML = `<p style="color:red;">Firebase connection failed.</p>`;
        });

        function showVotingClosed(reason) {
            votingArea.style.display = 'none';
            noLiveArea.style.display = 'block';
            loadingOverlay.style.display = 'none';
            activeSingerId = null;
            console.log("Voting closed:", reason);
        }

        async function loadSingerInfo(id) {
            try {
                const doc = await db.collection('participants').doc(id).get();
                return doc.exists ? { id, ...doc.data() } : null;
            } catch (e) {
                return null;
            }
        }

        function updateSelectorItem(idx, data, isVisible) {
            const el = document.getElementById(`sel-item-${idx}`);
            if (!data || !isVisible) {
                el.style.display = 'none';
                return;
            }
            el.style.display = 'flex';
            document.getElementById(`sel-img-${idx}`).src = data.photoBase64 || 'logo.jpg';
            document.getElementById(`sel-name-${idx}`).textContent = (data.name || 'Singer').split(' ')[0];
        }

        function switchSinger(idx) {
            activeIdx = idx;
            const data = idx === 1 ? singer1Data : singer2Data;
            if (!data) return;

            activeSingerId = data.id;
            
            document.getElementById('sel-item-1').classList.toggle('active', idx === 1);
            document.getElementById('sel-item-2').classList.toggle('active', idx === 2);
            
            updateCurrentSingerDisplay();
        }

        function updateCurrentSingerDisplay() {
            const data = activeIdx === 1 ? singer1Data : singer2Data;
            if (!data) return;

            document.getElementById('vote-singer-img').src = data.photoBase64 || 'logo.jpg';
            document.getElementById('vote-singer-name').textContent = (data.name || 'SINGER').toUpperCase();
            
            const hasVoted = localStorage.getItem('voted_' + data.id);
            const card = document.querySelector('.vote-card');
            
            if (hasVoted) {
                card.classList.add('voted');
            } else {
                card.classList.remove('voted');
                selectScore(0);
            }
        }

        function selectScore(s) {
            currentScore = s;
            document.querySelectorAll('.score-btn').forEach(btn => {
                btn.classList.toggle('active', parseInt(btn.textContent) === s);
            });
        }

        async function castVote() {
            if (currentScore === 0) {
                alert("Please select a score first!");
                return;
            }
            if (!activeSingerId) return;

            const btn = document.getElementById('submit-vote');
            btn.disabled = true;
            btn.textContent = "SENDING...";

            try {
                await db.collection('live_votes').add({
                    voterId: voterId,
                    singerId: activeSingerId,
                    score: currentScore,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });

                localStorage.setItem('voted_' + activeSingerId, 'true');
                document.querySelector('.vote-card').classList.add('voted');
            } catch (e) {
                alert("Error sending vote. Please try again.");
                btn.disabled = false;
            } finally {
                btn.textContent = "SUBMIT VOTE";
            }
        }
    </script>
</body>
</html>
