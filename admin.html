<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Machi FM | General Admin</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body {
            background: #050505;
            color: white;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .hub-container {
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            text-align: center;
            flex: 1;
        }

        .hub-header { margin-bottom: 40px; }
        .hub-header img { width: 80px; border-radius: 50%; margin-bottom: 15px; border: 2px solid var(--primary); }
        .hub-header h1 { font-size: 2.5rem; letter-spacing: 2px; }

        .hub-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .hub-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            text-decoration: none;
            color: white;
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .hub-card:hover {
            background: rgba(255, 20, 147, 0.1);
            border-color: var(--primary);
            transform: translateY(-5px);
        }

        .hub-card i { font-size: 2.5rem; color: var(--primary); }
        .hub-card h3 { font-size: 1.5rem; }
        .hub-card p { font-size: 0.9rem; opacity: 0.7; }

        .btn-logout { margin-top: 40px; background: #222; color: white; border: none; padding: 10px 30px; border-radius: 50px; cursor: pointer; }

        @media (max-width: 600px) {
            .hub-grid { grid-template-columns: 1fr; }
            .hub-header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <div class="hub-container" id="admin-hub" style="display:none;">
        <div class="hub-header">
            <img src="logo.jpg" alt="Logo">
            <h1>FM ADMIN HUB</h1>
            <p>Welcome back, Admin</p>
        </div>

        <div class="hub-grid">
            <!-- Super Singer Focus (Until May 1) -->
            <a href="ss-admin.html" class="hub-card" style="border-color: var(--primary); background: rgba(255,20,147,0.05);">
                <i class="fa-solid fa-microphone-lines"></i>
                <h3>Super Singer 2026</h3>
                <p>Manage participants, voting, and live reveals.</p>
                <span class="badge badge-primary" style="background:var(--primary); color:black; font-size:0.7rem; padding:2px 10px; border-radius:10px; font-weight:900;">LIVE EVENT</span>
            </a>

            <!-- General FM Tasks -->
            <a href="#" class="hub-card" onclick="alert('General CMS loading soon...')">
                <i class="fa-solid fa-calendar-days"></i>
                <h3>Radio Schedule</h3>
                <p>Manage RJ shifts and daily programs.</p>
            </a>

            <a href="#" class="hub-card" onclick="alert('Listeners analytics coming soon...')">
                <i class="fa-solid fa-chart-line"></i>
                <h3>Analytics</h3>
                <p>View listener stats and song requests.</p>
            </a>
        </div>

        <button class="btn-logout" id="logout-btn">LOGOUT</button>
    </div>

    <!-- Login Screen -->
    <div id="login-screen" style="flex: 1; display: flex; align-items: center; justify-content: center;">
        <div style="text-align: center; background: #111; padding: 50px; border-radius: 30px; border: 1px solid #333;">
            <img src="logo.jpg" style="width: 80px; border-radius: 50%; margin-bottom: 20px;">
            <h2 style="margin-bottom: 20px;">FM ADMIN LOGIN</h2>
            <button id="login-btn" class="btn btn-primary" style="padding: 15px 40px; font-size: 1.2rem;">
                <i class="fa-brands fa-google"></i> SIGN IN WITH GOOGLE
            </button>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const auth = firebase.auth();
        const hub = document.getElementById('admin-hub');
        const login = document.getElementById('login-screen');

        auth.onAuthStateChanged(user => {
            if (user) {
                hub.style.display = 'block';
                login.style.display = 'none';
            } else {
                hub.style.display = 'none';
                login.style.display = 'flex';
            }
        });

        document.getElementById('login-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        document.getElementById('logout-btn').onclick = () => auth.signOut();
    </script>
</body>
</html>
