<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Hello Machi FM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .admin-header {
            background: var(--bg-card);
            border-bottom: 1px solid var(--glass-border);
            padding: 20px 0;
            margin-bottom: 40px;
        }
        .admin-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .table-container {
            background: var(--bg-card);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        th { color: var(--text-muted); font-size: 0.9rem; text-transform: uppercase; }
        td { font-size: 0.95rem; }
        
        .badge {
            padding: 5px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold;
        }
        .badge-pending { background: rgba(255,193,7,0.2); color: #ffc107; border: 1px solid rgba(255,193,7,0.4); }
        .badge-approved { background: rgba(40,167,69,0.2); color: #28a745; border: 1px solid rgba(40,167,69,0.4); }
        
        .action-btn {
            background: rgba(255,255,255,0.1); border: none; color: white;
            padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-right: 5px;
            transition: 0.2s;
        }
        .action-btn:hover { background: var(--primary); color: black; }
        .btn-danger:hover { background: var(--secondary); color: white; }
    </style>
</head>
<body>

    <!-- Admin Header -->
    <header class="admin-header">
        <div class="container admin-nav">
            <div class="logo">
                <img src="logo.jpg" alt="Logo">
                <span>HELLO MACHI <b>ADMIN</b></span>
            </div>
            <div id="admin-auth">
                <button id="admin-login-btn" class="btn btn-primary" style="padding: 10px 20px;">
                    <i class="fa-solid fa-lock"></i> Admin Login
                </button>
                <div id="admin-user-info" style="display: none; align-items: center; gap: 15px;">
                    <span id="admin-name" style="font-weight: bold;"></span>
                    <button id="admin-logout-btn" class="btn btn-secondary" style="padding: 8px 16px; font-size: 0.8rem;">Logout</button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <section class="container" id="admin-content" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h2>Super Singer Participants</h2>
            <a href="supersinger.html" class="btn btn-secondary" style="padding: 8px 16px;" target="_blank">View Live Portal <i class="fa-solid fa-arrow-up-right-from-square"></i></a>
        </div>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Contact</th>
                        <th>Audition</th>
                        <th>Votes</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="participants-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; color: var(--text-muted); padding: 40px;">
                            <i class="fa-solid fa-spinner fa-spin fa-2x"></i><br><br>Loading data...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </section>

    <!-- Locked State -->
    <section class="container" id="locked-content" style="text-align: center; padding: 100px 0;">
        <i class="fa-solid fa-shield-halved" style="font-size: 4rem; color: var(--text-muted); margin-bottom: 20px;"></i>
        <h2>Access Restricted</h2>
        <p class="text-muted">Please sign in with your admin Google account to manage the portal.</p>
    </section>

    <!-- Load Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    
    <script src="firebase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
