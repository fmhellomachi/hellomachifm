<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOTE NOW | Hello Machi FM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #050508;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .vote-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            margin-top: 20px;
        }

        .singer-preview {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            object-fit: cover;
        }

        h2 { color: var(--primary); margin: 10px 0; }

        .score-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .score-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: white;
            padding: 15px 0;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .score-btn.active {
            background: var(--primary);
            color: black;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        #submit-vote {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #submit-vote:disabled { opacity: 0.5; cursor: not-allowed; }

        .voted-msg {
            color: #28a745;
            font-weight: bold;
            display: none;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <img src="logo.jpg" style="width: 80px; border-radius: 50%; margin-bottom: 20px;">
    
    <div id="live-voting-area" style="display:none; width: 100%; display:flex; flex-direction:column; align-items:center;">
        <div class="vote-card">
            <img id="vote-singer-img" src="logo.jpg" class="singer-preview">
            <h3 style="margin:0; opacity:0.7;">VOTING FOR</h3>
            <h2 id="vote-singer-name">...</h2>
            
            <p style="margin-top:20px; font-size:0.9rem; color:var(--text-muted);">Rate this performance from 1 to 10</p>
            
            <div class="score-buttons" id="score-container">
                <button class="score-btn" onclick="selectScore(1)">1</button>
                <button class="score-btn" onclick="selectScore(2)">2</button>
                <button class="score-btn" onclick="selectScore(3)">3</button>
                <button class="score-btn" onclick="selectScore(4)">4</button>
                <button class="score-btn" onclick="selectScore(5)">5</button>
                <button class="score-btn" onclick="selectScore(6)">6</button>
                <button class="score-btn" onclick="selectScore(7)">7</button>
                <button class="score-btn" onclick="selectScore(8)">8</button>
                <button class="score-btn" onclick="selectScore(9)">9</button>
                <button class="score-btn" onclick="selectScore(10)">10</button>
            </div>

            <button id="submit-vote" onclick="castVote()">SUBMIT VOTE</button>
            <div id="voted-msg" class="voted-msg"><i class="fa-solid fa-check-circle"></i> VOTE RECEIVED!</div>
        </div>
    </div>

    <div id="no-live-area" style="text-align:center; margin-top:50px;">
        <i class="fa-solid fa-hourglass-half" style="font-size:3rem; color:var(--text-muted); margin-bottom:20px;"></i>
        <h2>VOTING IS CLOSED</h2>
        <p style="color:var(--text-muted);">Please stay tuned to the live broadcast to vote for the next singer.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentScore = 0;
        let activeSingerId = null;
        let voterId = localStorage.getItem('voter_id') || ('V' + Math.floor(Math.random() * 1000000));
        localStorage.setItem('voter_id', voterId);

        db.collection('live_state').doc('current').onSnapshot(doc => {
            const state = doc.data();
            const votingArea = document.getElementById('live-voting-area');
            const noLiveArea = document.getElementById('no-live-area');

            if (state && state.status === 'on-air' && state.votingOpen) {
                votingArea.style.display = 'flex';
                noLiveArea.style.display = 'none';
                activeSingerId = state.singer1; // Simplified for MVP: Vote for primary singer
                loadSingerInfo(activeSingerId);
                
                // Reset if singer changed
                if (localStorage.getItem('last_voted_singer') !== activeSingerId) {
                    resetVoteUI();
                } else {
                    showSuccess();
                }
            } else {
                votingArea.style.display = 'none';
                noLiveArea.style.display = 'block';
            }
        });

        async function loadSingerInfo(id) {
            const doc = await db.collection('participants').doc(id).get();
            if (doc.exists) {
                document.getElementById('vote-singer-name').textContent = doc.data().name;
                document.getElementById('vote-singer-img').src = doc.data().photoBase64 || 'logo.jpg';
            }
        }

        function selectScore(s) {
            currentScore = s;
            document.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function castVote() {
            if (currentScore === 0) {
                alert("Please select a score first!");
                return;
            }

            const btn = document.getElementById('submit-vote');
            btn.disabled = true;
            btn.textContent = "CASTING...";

            try {
                await db.collection('live_votes').add({
                    voterId: voterId,
                    singerId: activeSingerId,
                    score: currentScore,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                localStorage.setItem('last_voted_singer', activeSingerId);
                showSuccess();
            } catch (err) {
                alert("Voting failed. Please try again.");
                btn.disabled = false;
                btn.textContent = "SUBMIT VOTE";
            }
        }

        function showSuccess() {
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('submit-vote').style.display = 'none';
            document.getElementById('voted-msg').style.display = 'block';
        }

        function resetVoteUI() {
            document.getElementById('score-container').style.display = 'grid';
            document.getElementById('submit-vote').style.display = 'block';
            document.getElementById('submit-vote').disabled = false;
            document.getElementById('submit-vote').textContent = "SUBMIT VOTE";
            document.getElementById('voted-msg').style.display = 'none';
            currentScore = 0;
            document.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('active'));
        }
    </script>
</body>
</html>
