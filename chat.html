<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Machi FM | Live Chat</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body, html {
            height: 100%;
            margin: 0;
            background: #050508;
            color: white;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #chat-header {
            background: var(--bg-card);
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        #chat-header img { width: 35px; border-radius: 50%; }
        #chat-header h2 { margin: 0; font-size: 1.1rem; font-family: 'Outfit', sans-serif; }
        
        #chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: linear-gradient(to bottom, #050508, #100515);
        }
        
        .msg {
            max-width: 85%;
            padding: 10px 15px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.4;
            position: relative;
            word-break: break-word;
        }
        .msg-other {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.08);
            border-bottom-left-radius: 2px;
        }
        .msg-me {
            align-self: flex-end;
            background: var(--primary);
            color: black;
            border-bottom-right-radius: 2px;
        }
        .msg-user {
            font-size: 0.75rem;
            font-weight: bold;
            margin-bottom: 3px;
            opacity: 0.8;
        }
        
        #chat-input-area {
            padding: 15px;
            background: var(--bg-card);
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
        }
        input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid #333;
            color: white;
            padding: 12px 18px;
            border-radius: 25px;
            outline: none;
            font-size: 1rem;
        }
        #send-btn {
            background: var(--primary);
            color: black;
            border: none;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <div id="chat-header">
        <img src="logo.jpg" alt="Logo">
        <div>
            <h2>LIVE CHAT</h2>
            <div style="font-size: 0.7rem; color: #28a745;"><i class="fa-solid fa-circle"></i> Connected</div>
        </div>
    </div>

    <div id="chat-messages">
        <div style="text-align: center; color: #666; font-size: 0.8rem; margin: 20px 0;">Loading history...</div>
    </div>

    <div id="chat-input-area">
        <input type="text" id="chat-input" placeholder="Type your message...">
        <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socket = io('https://hello-machi-backend.onrender.com');
            const messagesContainer = document.getElementById('chat-messages');
            const input = document.getElementById('chat-input');
            const sendBtn = document.getElementById('send-btn');
            
            let username = localStorage.getItem('chat_username');
            if (!username) {
                username = prompt("Enter your nickname for the chat:") || ('User_' + Math.floor(Math.random() * 9000 + 1000));
                localStorage.setItem('chat_username', username);
            }

            // --- Load Persistent History ---
            async function loadHistory() {
                try {
                    const snapshot = await db.collection('chats').orderBy('timestamp', 'desc').limit(50).get();
                    messagesContainer.innerHTML = '';
                    const msgs = [];
                    snapshot.forEach(doc => msgs.push(doc.data()));
                    msgs.reverse().forEach(addMessage);
                    scrollToBottom();
                } catch (err) {
                    console.error("History Error:", err);
                    messagesContainer.innerHTML = '<div style="text-align:center; color:red;">History unavailable.</div>';
                }
            }

            function addMessage(data) {
                const div = document.createElement('div');
                const isMe = data.username === username;
                div.className = `msg ${isMe ? 'msg-me' : 'msg-other'}`;
                
                div.innerHTML = `
                    <div class="msg-user">${data.username}</div>
                    <div>${data.text}</div>
                `;
                messagesContainer.appendChild(div);
                scrollToBottom();
            }

            function scrollToBottom() {
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            }

            // --- Real-time Listeners ---
            socket.on('message', (data) => {
                addMessage(data);
            });

            async function sendMessage() {
                const text = input.value.trim();
                if (!text) return;

                const msgData = {
                    username: username,
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };

                // Emit and Save
                socket.emit('message', msgData);
                try {
                    await db.collection('chats').add(msgData);
                } catch (err) { console.error("Save Error:", err); }

                input.value = '';
            }

            sendBtn.addEventListener('click', sendMessage);
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });

            loadHistory();
        });
    </script>
</body>
</html>
