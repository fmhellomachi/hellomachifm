<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOTE NOW | Hello Machi FM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #050508;
            color: white;
            font-family: 'Outfit', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
            align-items: center;
        }

        .vote-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 400px;
            border-radius: 30px;
            padding: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            margin-top: 20px;
        }

        .singer-preview {
            width: 120px;
            height: 120px;
            border-radius: 12px;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            object-fit: contain;
            background: #000;
        }

        h2 { color: var(--primary); margin: 10px 0; }

        .score-buttons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
            margin: 25px 0;
        }

        .score-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid #444;
            color: white;
            padding: 15px 0;
            border-radius: 12px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.2s;
        }

        .score-btn.active {
            background: var(--primary);
            color: black;
            border-color: var(--primary);
            transform: scale(1.1);
        }

        #submit-vote {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            background: var(--secondary);
            color: white;
            border: none;
            font-weight: 900;
            font-size: 1.1rem;
            cursor: pointer;
            text-transform: uppercase;
        }

        #submit-vote:disabled { opacity: 0.5; cursor: not-allowed; }

        .voted-msg {
            color: #28a745;
            font-weight: bold;
            display: none;
            margin-top: 20px;
        }

        /* Duet Selector Styles */
        .singer-selector {
            display: none;
            gap: 15px;
            margin-bottom: 25px;
            width: 100%;
            justify-content: center;
        }

        .sel-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.4;
            cursor: pointer;
            transition: all 0.3s;
            max-width: 100px;
        }

        .sel-item.active {
            opacity: 1;
            transform: scale(1.1);
        }

        .sel-img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid transparent;
            object-fit: contain;
            background: #000;
            margin-bottom: 8px;
        }

        .active .sel-img {
            border-color: var(--primary);
            box-shadow: 0 0 15px var(--primary-glow);
        }

        .sel-name {
            font-size: 0.75rem;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }
    </style>
</head>
<body>

    <img src="logo.jpg" style="width: 80px; border-radius: 12px; margin-bottom: 20px; object-fit: contain; background: #000;">
    
    <div id="live-voting-area" style="display:none; width: 100%; flex-direction:column; align-items:center;">
        
        <!-- Duet Selector -->
        <div class="singer-selector" id="singer-selector">
            <div class="sel-item active" id="sel-item-1" onclick="switchSinger(1)">
                <img id="sel-img-1" src="logo.jpg" class="sel-img">
                <div id="sel-name-1" class="sel-name">Singer 1</div>
            </div>
            <div class="sel-item" id="sel-item-2" onclick="switchSinger(2)">
                <img id="sel-img-2" src="logo.jpg" class="sel-img">
                <div id="sel-name-2" class="sel-name">Singer 2</div>
            </div>
        </div>

        <div class="vote-card">
            <img id="vote-singer-img" src="logo.jpg" class="singer-preview">
            <h3 style="margin:0; opacity:0.7;">VOTING FOR</h3>
            <h2 id="vote-singer-name">...</h2>
            
            <p style="margin-top:20px; font-size:0.9rem; color:var(--text-muted);">Rate this performance from 1 to 10</p>
            
            <div class="score-buttons" id="score-container">
                <button class="score-btn" onclick="selectScore(1)">1</button>
                <button class="score-btn" onclick="selectScore(2)">2</button>
                <button class="score-btn" onclick="selectScore(3)">3</button>
                <button class="score-btn" onclick="selectScore(4)">4</button>
                <button class="score-btn" onclick="selectScore(5)">5</button>
                <button class="score-btn" onclick="selectScore(6)">6</button>
                <button class="score-btn" onclick="selectScore(7)">7</button>
                <button class="score-btn" onclick="selectScore(8)">8</button>
                <button class="score-btn" onclick="selectScore(9)">9</button>
                <button class="score-btn" onclick="selectScore(10)">10</button>
            </div>

            <button id="submit-vote" onclick="castVote()">SUBMIT VOTE</button>
            <div id="voted-msg" class="voted-msg"><i class="fa-solid fa-check-circle"></i> VOTE RECEIVED!</div>
        </div>
    </div>

    <div id="no-live-area" style="text-align:center; margin-top:50px;">
        <i class="fa-solid fa-hourglass-half" style="font-size:3rem; color:var(--text-muted); margin-bottom:20px;"></i>
        <h2>VOTING IS CLOSED</h2>
        <p style="color:var(--text-muted);">Please stay tuned to the live broadcast to vote for the next singer.</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentScore = 0;
        let activeSingerId = null;
        let singer1Data = null;
        let singer2Data = null;
        let voterId = localStorage.getItem('voter_id') || ('V' + Math.floor(Math.random() * 1000000));
        localStorage.setItem('voter_id', voterId);

        db.collection('live_state').doc('current').onSnapshot(async doc => {
            if (!doc.exists) {
                document.getElementById('live-voting-area').style.display = 'none';
                document.getElementById('no-live-area').style.display = 'block';
                return;
            }
            const state = doc.data();
            const votingArea = document.getElementById('live-voting-area');
            const noLiveArea = document.getElementById('no-live-area');

            if (state && state.status === 'on-air' && state.votingOpen && state.singer1) {
                votingArea.style.display = 'flex';
                noLiveArea.style.display = 'none';
                
                // Load Singer 1
                singer1Data = await loadSingerInfo(state.singer1);
                
                // Load Singer 2 if exists
                if (state.singer2) {
                    singer2Data = await loadSingerInfo(state.singer2);
                    document.getElementById('singer-selector').style.display = 'flex';
                    updateSelectorUI();
                } else {
                    singer2Data = null;
                    document.getElementById('singer-selector').style.display = 'none';
                }

                // Default to singer 1 if no active singer yet or singer changed
                if (!activeSingerId || (activeSingerId !== state.singer1 && activeSingerId !== state.singer2)) {
                    activeSingerId = state.singer1;
                    switchSinger(1);
                } else {
                    // Just refresh current view
                    updateCurrentSingerDisplay();
                }

            } else {
                votingArea.style.display = 'none';
                noLiveArea.style.display = 'block';
                activeSingerId = null;
            }
        });

        async function loadSingerInfo(id) {
            const doc = await db.collection('participants').doc(id).get();
            return doc.exists ? { id, ...doc.data() } : null;
        }

        function updateSelectorUI() {
            if (singer1Data) {
                document.getElementById('sel-img-1').src = singer1Data.photoBase64 || 'logo.jpg';
                document.getElementById('sel-name-1').textContent = singer1Data.name;
            }
            if (singer2Data) {
                document.getElementById('sel-img-2').src = singer2Data.photoBase64 || 'logo.jpg';
                document.getElementById('sel-name-2').textContent = singer2Data.name;
            }
        }

        function switchSinger(index) {
            activeSingerId = (index === 1) ? singer1Data?.id : singer2Data?.id;
            
            // Update UI highlight
            document.getElementById('sel-item-1').classList.toggle('active', index === 1);
            document.getElementById('sel-item-2').classList.toggle('active', index === 2);
            
            updateCurrentSingerDisplay();
        }

        function updateCurrentSingerDisplay() {
            const data = (activeSingerId === singer1Data?.id) ? singer1Data : singer2Data;
            if (!data) return;

            document.getElementById('vote-singer-name').textContent = data.name;
            document.getElementById('vote-singer-img').src = data.photoBase64 || 'logo.jpg';

            // Check if already voted for THIS singer
            if (localStorage.getItem(`voted_${activeSingerId}`)) {
                showSuccess();
            } else {
                resetVoteUI();
            }
        }

        function selectScore(s) {
            currentScore = s;
            document.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('active'));
            const btn = document.querySelector(`.score-btn:nth-child(${s})`);
            if (btn) btn.classList.add('active');
        }

        async function castVote() {
            if (!activeSingerId) return;
            if (currentScore === 0) {
                alert("Please select a score first!");
                return;
            }

            const btn = document.getElementById('submit-vote');
            btn.disabled = true;
            btn.textContent = "CASTING...";

            try {
                await db.collection('live_votes').add({
                    voterId: voterId,
                    singerId: activeSingerId,
                    score: currentScore,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                localStorage.setItem(`voted_${activeSingerId}`, "true");
                showSuccess();
            } catch (err) {
                alert("Voting failed. Please try again.");
                btn.disabled = false;
                btn.textContent = "SUBMIT VOTE";
            }
        }

        function showSuccess() {
            document.getElementById('score-container').style.display = 'none';
            document.getElementById('submit-vote').style.display = 'none';
            document.getElementById('voted-msg').style.display = 'block';
        }

        function resetVoteUI() {
            document.getElementById('score-container').style.display = 'grid';
            document.getElementById('submit-vote').style.display = 'block';
            document.getElementById('submit-vote').disabled = false;
            document.getElementById('submit-vote').textContent = "SUBMIT VOTE";
            document.getElementById('voted-msg').style.display = 'none';
            currentScore = 0;
            document.querySelectorAll('.score-btn').forEach(btn => btn.classList.remove('active'));
        }

    </script>
</body>
</html>
