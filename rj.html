<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello Machi FM | RJ Control Panel</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary-pink: #ff1493;
            --accent-gold: #FFD700;
            --bg-darker: #050508;
            --bg-card: rgba(20, 20, 30, 0.6);
            --border-glass: rgba(255, 255, 255, 0.08);
        }

        body {
            background: var(--bg-darker);
            color: #fff;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            margin: 0;
        }

        h1, h2, h3, h4 {
            font-family: 'Outfit', sans-serif;
        }

        .rj-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
            width: 100%;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .rj-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 20px;
            padding: 20px 30px;
            backdrop-filter: blur(10px);
        }

        .rj-header-left {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .rj-header-left img {
            width: 50px;
            height: 50px;
            border-radius: 10px;
            border: 1px solid var(--primary-pink);
        }

        .rj-header-left h1 {
            margin: 0;
            font-size: 1.6rem;
            letter-spacing: 1px;
            font-weight: 900;
        }

        .rj-stats-badge {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #22c55e;
            font-size: 0.75rem;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-action {
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        .btn-pink { background: var(--primary-pink); color: white; }
        .btn-pink:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(255, 20, 147, 0.4); }
        .btn-outline { background: transparent; border: 1px solid #444; color: #aaa; }
        .btn-outline:hover { color: white; border-color: white; }

        .rj-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 25px;
        }

        .rj-panel {
            background: var(--bg-card);
            border: 1px solid var(--border-glass);
            border-radius: 24px;
            padding: 25px;
            backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
        }

        /* 8 cols for requests / shoutouts, 4 cols for polls */
        .panel-polls { grid-column: span 7; height: 600px; }
        .panel-reply { grid-column: span 5; height: 600px; }

        .reply-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 14px;
            flex-shrink: 0;
        }
        .reply-message { font-size: 0.9rem; color: #ddd; margin: 0 0 4px 0; }
        .reply-nickname { color: var(--accent-gold); font-size: 0.8rem; font-weight: bold; }
        .reply-time { color: #555; font-size: 0.7rem; }
        .reply-input-area { display: flex; gap: 8px; margin-top: 10px; }
        .reply-input {
            flex: 1;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: white;
            padding: 8px 12px;
            font-size: 0.8rem;
            outline: none;
        }
        .reply-input:focus { border-color: var(--secondary); }
        .reply-send-btn {
            background: var(--secondary);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 10px;
            padding: 8px 14px;
            font-size: 0.75rem;
            cursor: pointer;
            white-space: nowrap;
        }
        .reply-send-btn:hover { opacity: 0.8; }
        .reply-badge {
            color: var(--secondary);
            font-size: 0.75rem;
            margin-top: 6px;
            padding: 4px 10px;
            background: rgba(0, 230, 118, 0.1);
            border-radius: 8px;
            display: inline-block;
        }

        .panel-title {
            font-size: 1.25rem;
            margin-top: 0;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 12px;
            font-weight: 700;
        }

        .form-group {
            margin-bottom: 16px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-bottom: 6px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: rgba(0,0,0,0.3);
            color: white;
            outline: none;
            font-size: 0.9rem;
        }

        /* Active Poll Display */
        .active-poll-box {
            background: rgba(255, 215, 0, 0.03);
            border: 1px solid rgba(255, 215, 0, 0.15);
            border-radius: 18px;
            padding: 20px;
            margin-top: 15px;
        }

        .poll-option-result {
            margin-bottom: 12px;
        }

        .poll-option-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.85rem;
            margin-bottom: 4px;
        }

        .poll-progress-bg {
            background: rgba(255,255,255,0.05);
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
        }

        .poll-progress-fill {
            background: var(--accent-gold);
            height: 100%;
            border-radius: 5px;
            transition: width 0.4s ease;
        }

        @media (max-width: 900px) {
            .rj-grid { grid-template-columns: 1fr; }
            .panel-polls, .panel-reply { grid-column: span 12; height: auto; min-height: 400px; }
            .rj-header { flex-direction: column; gap: 15px; text-align: center; }
        }
    </style>
</head>
<body>

    <!-- Login Screen overlay (uses same structure as admin.html) -->
    <div id="login-screen" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 10000; background: var(--bg-darker); display: flex; align-items: center; justify-content: center; padding: 20px;">
        <div style="text-align: center; background: rgba(15, 15, 25, 0.95); padding: 40px 30px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.8);">
            <img src="logo.jpg" style="width: 80px; height: 80px; border-radius: 12px; margin-bottom: 20px; object-fit: contain; background: #000; border: 1px solid #333;">
            <h2 style="margin-bottom: 25px; font-weight: 900; letter-spacing: 1px; font-family: 'Outfit', sans-serif;">RJ PANEL LOGIN</h2>
            
            <div style="margin-bottom: 15px; text-align: left;">
                <label style="display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; font-weight: bold; letter-spacing: 0.5px;">EMAIL ADDRESS</label>
                <input type="email" id="login-email" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; font-size: 1rem;" placeholder="rj@hellomachi.com">
            </div>
            
            <div style="margin-bottom: 25px; text-align: left;">
                <label style="display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; font-weight: bold; letter-spacing: 0.5px;">PASSWORD</label>
                <input type="password" id="login-password" style="width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #333; background: #1a1a1a; color: white; outline: none; font-size: 1rem;" placeholder="••••••••">
            </div>

            <button id="login-btn" style="width: 100%; padding: 14px; font-size: 1.1rem; font-weight: bold; background: var(--accent-gold); color: black; border: none; cursor: pointer; border-radius: 50px; transition: 0.2s;">
                SIGN IN
            </button>
            
            <div id="login-error" style="color: #ff4d4d; font-size: 0.85rem; margin-top: 15px; display: none; background: rgba(255,0,0,0.1); padding: 8px; border-radius: 6px;"></div>
        </div>
    </div>

    <!-- Main Jockey Dashboard -->
    <div class="rj-container" id="rj-dashboard" style="display: none;">
        <div class="rj-header">
            <div class="rj-header-left">
                <img src="logo.jpg" alt="Logo">
                <div>
                    <h1>ON-AIR STUDIO PANEL</h1>
                    <div style="display: flex; gap: 10px; margin-top: 5px;">
                        <span class="rj-stats-badge"><i class="fa-solid fa-signal"></i> Active Vibe</span>
                        <span id="activeRJName" style="font-size: 0.75rem; color: #aaa; align-self: center;">Jockey</span>
                    </div>
                </div>
            </div>
            <div style="display: flex; gap: 12px;">
                <a href="admin.html" class="btn-action btn-outline" id="admin-hub-link" style="display: none; text-decoration: none;">ADMIN HUB</a>
                <button class="btn-action btn-outline" id="logout-btn">LOGOUT</button>
            </div>
        </div>

        <div class="rj-grid">
            <!-- Poll management -->
            <div class="rj-panel panel-polls">
                <div class="panel-title">📊 MANAGE LIVE POLL</div>
                
                <!-- Poll Creator -->
                <div id="poll-creator">
                    <div class="form-group">
                        <label>POLL QUESTION</label>
                        <input type="text" id="poll-question" placeholder="e.g., Which RJ Vijay track next?">
                    </div>
                    <div id="poll-options-container">
                        <div class="form-group">
                            <label>OPTION 1</label>
                            <input type="text" class="poll-opt-input" placeholder="e.g., Rowdy Baby 💃">
                        </div>
                        <div class="form-group">
                            <label>OPTION 2</label>
                            <input type="text" class="poll-opt-input" placeholder="e.g., Arabic Kuthu 🕺">
                        </div>
                    </div>
                    <button class="btn-action btn-outline" id="add-poll-opt-btn" style="width: 100%; padding: 8px; margin-top: 5px; font-size: 0.8rem;">+ ADD OPTION</button>
                    <button class="btn-action btn-pink" id="create-poll-btn" style="width: 100%; padding: 12px; margin-top: 8px;">PUBLISH POLL</button>
                </div>

                <!-- Active Poll Status -->
                <div id="active-poll-display" style="display: none; flex: 1; display: flex; flex-direction: column;">
                    <div class="active-poll-box">
                        <h4 style="margin-top: 0; margin-bottom: 15px; color: var(--accent-gold);" id="active-poll-question">Active Poll Question</h4>
                        <div id="poll-results-bars">
                            <!-- Injected dynamically -->
                        </div>
                    </div>
                    <button class="btn-action btn-outline" id="close-poll-btn" style="width: 100%; padding: 12px; margin-top: auto;">CLOSE CURRENT POLL</button>
                </div>
            </div>

            <!-- Shoutout Replies -->
            <div class="rj-panel panel-reply">
                <div class="panel-title">💬 REPLY TO SHOUTOUTS</div>
                <div id="shoutout-reply-feed" style="flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; padding-right: 5px;">
                    <div style="text-align: center; color: #666; margin-top: 40px;">Loading shoutouts...</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase Compat SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const login = document.getElementById('login-screen');
        const dashboard = document.getElementById('rj-dashboard');
        const loginError = document.getElementById('login-error');
        const pollCreator = document.getElementById('poll-creator');
        const pollDisplay = document.getElementById('active-poll-display');
        const activePollQuestion = document.getElementById('active-poll-question');
        const pollResultsBars = document.getElementById('poll-results-bars');

        let userRole = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                // Verify user role
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        const userData = doc.data();
                        const role = userData.role ? userData.role.toLowerCase() : '';
                        userRole = role;

                        if (role === 'rj' || role === 'admin') {
                            login.style.display = 'none';
                            dashboard.style.display = 'flex';
                            rjName = userData.name || 'Jockey';
                            document.getElementById('activeRJName').textContent = rjName;
                            
                            if (role === 'admin') {
                                document.getElementById('admin-hub-link').style.display = 'block';
                            }
                            
                            startListeners();
                        } else {
                            showError("Access Denied: Role not authorized for Jockey Panel.");
                        }
                    } else {
                        showError("Access Denied: User UID not registered.");
                    }
                }).catch(err => {
                    showError("Error checking role: " + err.message);
                });
            } else {
                login.style.display = 'flex';
                dashboard.style.display = 'none';
            }
        });

        function showError(msg) {
            loginError.textContent = msg;
            loginError.style.display = 'block';
            auth.signOut();
        }

        // --- Firebase Auth Login ---
        document.getElementById('login-btn').onclick = () => {
            const email = document.getElementById('login-email').value.trim();
            const password = document.getElementById('login-password').value;
            
            if (!email || !password) {
                loginError.textContent = "Please fill in all fields.";
                loginError.style.display = 'block';
                return;
            }
            
            loginError.style.display = 'none';
            auth.signInWithEmailAndPassword(email, password).catch(err => {
                loginError.textContent = "Authentication failed: " + err.message;
                loginError.style.display = 'block';
            });
        };

        document.getElementById('logout-btn').onclick = () => {
            auth.signOut().then(() => window.location.reload());
        };

        // --- Active Listeners ---
        let pollUnsubscribe = null;
        let replyUnsubscribe = null;
        let rjName = '';

        function startListeners() {
            if (pollUnsubscribe) pollUnsubscribe();
            if (replyUnsubscribe) replyUnsubscribe();

            // Poll Status Stream
            pollUnsubscribe = db.collection('polls').doc('active')
                .onSnapshot(doc => {
                    if (doc.exists && doc.data().status === 'active') {
                        const data = doc.data();
                        pollCreator.style.display = 'none';
                        pollDisplay.style.display = 'flex';
                        activePollQuestion.textContent = data.question;

                        // Display Results with Progress Bars
                        pollResultsBars.innerHTML = '';
                        const votes = data.votes || {};
                        const totalVotes = Object.values(votes).reduce((a, b) => a + b, 0);

                        data.options.forEach((opt, idx) => {
                            const count = votes[String(idx)] || 0;
                            const pct = totalVotes > 0 ? Math.round((count / totalVotes) * 100) : 0;
                            
                            const optDiv = document.createElement('div');
                            optDiv.className = 'poll-option-result';
                            optDiv.innerHTML = `
                                <div class="poll-option-label">
                                    <span>${opt}</span>
                                    <strong>${count} votes (${pct}%)</strong>
                                </div>
                                <div class="poll-progress-bg">
                                    <div class="poll-progress-fill" style="width: ${pct}%"></div>
                                </div>
                            `;
                            pollResultsBars.appendChild(optDiv);
                        });
                    } else {
                        pollCreator.style.display = 'block';
                        pollDisplay.style.display = 'none';
                    }
                }, err => {
                    console.error("Poll subscribe error:", err);
                });

            // Shoutout Reply Stream
            const replyFeed = document.getElementById('shoutout-reply-feed');
            replyUnsubscribe = db.collection('shoutouts')
                .orderBy('timestamp', 'desc')
                .limit(30)
                .onSnapshot(snap => {
                    replyFeed.innerHTML = '';
                    if (snap.empty) {
                        replyFeed.innerHTML = '<div style="text-align: center; color: #666; margin-top: 40px;">No shoutouts yet.</div>';
                        return;
                    }
                    snap.forEach(doc => {
                        const data = doc.data();
                        const docId = doc.id;
                        const timeStr = data.timestamp
                            ? new Date(data.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
                            : '';
                        const card = document.createElement('div');
                        card.className = 'reply-card';
                        card.innerHTML = `
                            <p class="reply-message">${escapeHtml(data.message || '')}</p>
                            <div style="display: flex; justify-content: space-between; align-items: center;">
                                <span class="reply-nickname">— ${escapeHtml(data.nickname || 'Anonymous')}</span>
                                <span class="reply-time">${timeStr}</span>
                            </div>
                            ${data.reply ? `
                                <div class="reply-badge">✍️ RJ: ${escapeHtml(data.reply)}</div>
                            ` : `
                                <div class="reply-input-area">
                                    <input type="text" class="reply-input" placeholder="Type a reply..." data-id="${docId}">
                                    <button class="reply-send-btn" data-id="${docId}">REPLY</button>
                                </div>
                            `}
                        `;
                        replyFeed.appendChild(card);
                    });

                    // Attach reply handlers
                    replyFeed.querySelectorAll('.reply-send-btn').forEach(btn => {
                        btn.onclick = async () => {
                            const id = btn.dataset.id;
                            const input = replyFeed.querySelector(`.reply-input[data-id="${id}"]`);
                            const replyText = input.value.trim();
                            if (!replyText) return;
                            btn.disabled = true;
                            btn.textContent = '...';
                            try {
                                await db.collection('shoutouts').doc(id).update({
                                    reply: replyText,
                                    replyTimestamp: Date.now(),
                                    repliedBy: rjName || 'RJ'
                                });
                                input.value = '';
                            } catch (err) {
                                alert("Reply failed: " + err.message);
                            }
                            btn.disabled = false;
                            btn.textContent = 'REPLY';
                        };
                    });
                    replyFeed.querySelectorAll('.reply-input').forEach(inp => {
                        inp.onkeydown = (e) => {
                            if (e.key === 'Enter') {
                                const btn = replyFeed.querySelector(`.reply-send-btn[data-id="${inp.dataset.id}"]`);
                                if (btn) btn.click();
                            }
                        };
                    });
                }, err => {
                    replyFeed.innerHTML = '<div style="text-align: center; color: #666; margin-top: 40px;">Failed to load shoutouts.</div>';
                });
        }

        function escapeHtml(str) {
            const el = document.createElement('div');
            el.textContent = str;
            return el.innerHTML;
        }

        // --- Poll Controls ---
        document.getElementById('add-poll-opt-btn').onclick = () => {
            const container = document.getElementById('poll-options-container');
            const inputs = container.querySelectorAll('.poll-opt-input');
            const next = inputs.length + 1;
            const div = document.createElement('div');
            div.className = 'form-group';
            div.innerHTML = `<label>OPTION ${next}</label><input type="text" class="poll-opt-input" placeholder="Option ${next}">`;
            container.appendChild(div);
        };

        document.getElementById('create-poll-btn').onclick = async () => {
            const question = document.getElementById('poll-question').value.trim();
            const inputs = document.querySelectorAll('.poll-opt-input');
            const options = [];
            inputs.forEach(inp => {
                const v = inp.value.trim();
                if (v) options.push(v);
            });

            if (!question || options.length < 2) {
                alert("Please specify the question and at least 2 options.");
                return;
            }

            const votes = {};
            options.forEach((_, idx) => { votes[String(idx)] = 0; });

            const pollData = {
                question: question,
                options: options,
                votes: votes,
                status: 'active',
                timestamp: Date.now()
            };

            try {
                await db.collection('polls').doc('active').set(pollData);
                document.getElementById('poll-question').value = '';
                document.querySelectorAll('.poll-opt-input').forEach(inp => inp.value = '');
            } catch (err) {
                alert("Publish failed: " + err.message);
            }
        };

        document.getElementById('close-poll-btn').onclick = async () => {
            if (!confirm("Are you sure you want to close this poll?")) return;
            try {
                await db.collection('polls').doc('active').update({ status: 'closed' });
            } catch (err) {
                alert("Close failed: " + err.message);
            }
        };
    </script>
</body>
</html>
