<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUPER SINGER LIVE | Hello Machi FM</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff2d8c;
            --secondary: #00f2ff;
            --bg: #050508;
        }

        body, html {
            height: 100%;
            margin: 0;
            background: var(--bg);
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
            color: white;
        }

        /* --- Cinematic Background Engine --- */
        .stage-world {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a0b2e 0%, #050508 100%);
            z-index: -1;
            overflow: hidden;
        }

        /* Floating Bokeh Particles */
        .particle {
            position: absolute;
            background: var(--primary);
            border-radius: 50%;
            filter: blur(20px);
            opacity: 0.15;
            animation: floatParticle 20s infinite linear;
        }

        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 0.2; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }

        /* Moving Spotlights */
        .spotlight {
            position: absolute;
            width: 40vw;
            height: 100vh;
            background: linear-gradient(to top, rgba(255, 45, 140, 0.1), transparent);
            top: 0;
            transform-origin: top center;
            animation: sweep 8s infinite alternate ease-in-out;
            z-index: -1;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }

        @keyframes sweep {
            from { transform: rotate(-30deg); }
            to { transform: rotate(30deg); }
        }

        /* Program Header */
        .program-header {
            position: absolute;
            top: 40px;
            text-align: center;
            width: 100%;
            z-index: 10;
        }

        .program-title {
            font-size: 1.5rem;
            font-weight: 900;
            letter-spacing: 8px;
            color: white;
            text-shadow: 0 0 20px var(--primary);
            margin: 0;
            text-transform: uppercase;
        }

        .program-sub {
            color: var(--secondary);
            font-weight: 500;
            font-size: 0.9rem;
            letter-spacing: 5px;
            margin-top: 5px;
        }

        /* --- Stage Layout --- */
        .main-stage {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Singer Visualizer Container */
        .singer-frame {
            position: relative;
            width: 450px;
            height: 450px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .singer-photo {
            width: 400px;
            height: 400px;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid white;
            box-shadow: 0 0 100px rgba(255, 45, 140, 0.6);
            animation: kenBurns 15s infinite alternate ease-in-out;
            z-index: 2;
        }

        @keyframes kenBurns {
            0% { transform: scale(1) translate(0, 0); }
            50% { transform: scale(1.1) translate(10px, -10px); }
            100% { transform: scale(1.05) translate(-10px, 10px); }
        }

        .glow-ring {
            position: absolute;
            width: 480px;
            height: 480px;
            border: 2px solid var(--primary);
            border-radius: 50%;
            opacity: 0.5;
            animation: spinRing 10s infinite linear;
        }

        @keyframes spinRing {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* --- Lower Thirds (TV Overlay) --- */
        .lower-thirds {
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        .singer-info-bar {
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            padding: 20px 60px;
            border-radius: 100px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .round-tag {
            color: var(--secondary);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .singer-name {
            font-size: 4.5rem;
            font-weight: 900;
            margin: 0;
            line-height: 1;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #fff, #bbb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- Live Voting HUD --- */
        .voting-hud {
            position: absolute;
            top: 60px;
            right: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 2s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .qr-box {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(255, 45, 140, 0.4);
            position: relative;
        }

        .qr-box img { width: 150px; height: 150px; }

        .vote-badge {
            margin-top: 15px;
            background: var(--primary);
            color: black;
            padding: 8px 25px;
            border-radius: 50px;
            font-weight: 900;
            font-size: 1rem;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0% { transform: scale(1); box-shadow: 0 0 0 rgba(255, 45, 140, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(255, 45, 140, 0.8); }
            100% { transform: scale(1); }
        }

        /* --- Battle Mode Overhaul --- */
        .battle-view {
            display: none;
            width: 100%;
            justify-content: space-around;
            align-items: center;
            max-width: 1400px;
        }

        .vs-text {
            font-size: 8rem;
            font-weight: 900;
            color: rgba(255,255,255,0.05);
            font-style: italic;
        }

        /* Transitions */
        .flash-effect {
            position: fixed;
            top:0; left:0; width:100%; height:100%;
            background: white;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
        }

        .flashing { animation: flashAnim 0.5s ease-out; }
        @keyframes flashAnim {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="enter-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#050508; z-index:999; display:flex; flex-direction:column; align-items:center; justify-content:center; cursor:pointer;" onclick="startStage()">
        <img src="logo.jpg" style="width:200px; border-radius:50%; margin-bottom:40px; border:5px solid var(--primary);">
        <h1 style="color:white; font-size:3rem; margin-bottom:20px;">READY FOR THE STAGE?</h1>
        <div style="background:var(--primary); color:black; padding:20px 60px; border-radius:100px; font-weight:900; font-size:1.8rem; box-shadow:0 0 50px var(--primary);">CLICK TO START BROADCAST</div>
    </div>

    <div class="stage-world" id="stage-world">
        <!-- Spotlights -->
        <div class="spotlight" style="left: 10%; animation-delay: 0s;"></div>
        <div class="spotlight" style="left: 50%; animation-delay: -4s; opacity: 0.05;"></div>
        <div class="spotlight" style="left: 90%; animation-delay: -2s;"></div>
        <!-- Particles generated by JS -->
    </div>

    <div class="program-header">
        <h3 class="program-title">HELLO MACHI <span style="color:var(--primary);">SUPER SINGER</span></h3>
        <div class="program-sub">SEASON 1 • LIVE FROM THE STUDIO</div>
    </div>

    <div class="flash-effect" id="flash"></div>

    <div class="main-stage">
        <!-- Live Status Info -->
        <div style="position:absolute; top:60px; left:60px; display:flex; align-items:center; gap:15px;">
            <div style="width:15px; height:15px; background:red; border-radius:50%; animation: pulse 1s infinite;"></div>
            <span style="font-weight:900; letter-spacing:3px; font-size:1.2rem;">LIVE STREAMING</span>
        </div>

        <!-- Solo Mode -->
        <div id="solo-frame" class="singer-frame">
            <div class="glow-ring"></div>
            <img id="singer-photo-main" src="https://via.placeholder.com/400" class="singer-photo">
        </div>

        <!-- Battle Mode -->
        <div id="battle-frame" class="battle-view">
            <div class="singer-frame" style="width:350px; height:350px;">
                <img id="battle-photo-1" src="https://via.placeholder.com/350" class="singer-photo" style="width:350px; height:350px; border-color:var(--primary);">
            </div>
            <div class="vs-text">VS</div>
            <div class="singer-frame" style="width:350px; height:350px;">
                <img id="battle-photo-2" src="https://via.placeholder.com/350" class="singer-photo" style="width:350px; height:350px; border-color:var(--secondary);">
            </div>
        </div>

        <!-- Voting HUD -->
        <div id="voting-hud" class="voting-hud" style="display:none;">
            <div class="qr-box">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://hello-machi-fm.vercel.app/vote.html">
            </div>
            <div class="vote-badge">VOTING OPEN</div>
            <div id="total-voters" style="margin-top:10px; font-weight:800; color:var(--primary);">0 VOTES RECEIVED</div>
        </div>

        <!-- Lower Thirds -->
        <div class="lower-thirds">
            <div class="singer-info-bar">
                <div id="round-label" class="round-tag">ROUND 1: SOLO SINGING</div>
                <h2 id="singer-name-label" class="singer-name">HELLO MACHI</h2>
            </div>
        </div>
    </div>

    <!-- Live Audio -->
    <audio id="stage-audio" src="https://hellomachifm.com/listen/hello_machi_fm/radio.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        const audio = document.getElementById('stage-audio');
        const flash = document.getElementById('flash');
        
        function startStage() {
            document.getElementById('enter-overlay').style.display = 'none';
            audio.play();
            createParticles();
        }

        function createParticles() {
            const world = document.getElementById('stage-world');
            for(let i=0; i<60; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.width = Math.random() * 50 + 10 + 'px';
                p.style.height = p.style.width;
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDelay = Math.random() * 20 + 's';
                p.style.animationDuration = Math.random() * 10 + 10 + 's';
                world.appendChild(p);
            }
        }

        let lastSingerId = null;

        db.collection('live_state').doc('current').onSnapshot(doc => {
            if (doc.exists) {
                const state = doc.data();
                if (state.singer1 !== lastSingerId) {
                    triggerFlash();
                    lastSingerId = state.singer1;
                }
                updateUI(state);
            }
        });

        function triggerFlash() {
            flash.classList.add('flashing');
            setTimeout(() => flash.classList.remove('flashing'), 500);
        }

        async function updateUI(state) {
            const solo = document.getElementById('solo-frame');
            const battle = document.getElementById('battle-frame');
            const hud = document.getElementById('voting-hud');
            const roundLabel = document.getElementById('round-label');
            const nameLabel = document.getElementById('singer-name-label');

            if (state.status === 'on-air') {
                roundLabel.textContent = `ROUND ${state.round}: ${getRoundName(state.round)}`;
                hud.style.display = state.votingOpen ? 'flex' : 'none';

                if (state.singer2) {
                    solo.style.display = 'none';
                    battle.style.display = 'flex';
                    const p1 = await getParticipant(state.singer1);
                    const p2 = await getParticipant(state.singer2);
                    document.getElementById('battle-photo-1').src = p1.photoBase64 || 'logo.jpg';
                    document.getElementById('battle-photo-2').src = p2.photoBase64 || 'logo.jpg';
                    nameLabel.textContent = `${p1.name} vs ${p2.name}`;
                } else {
                    solo.style.display = 'flex';
                    battle.style.display = 'none';
                    const p1 = await getParticipant(state.singer1);
                    document.getElementById('singer-photo-main').src = p1.photoBase64 || 'logo.jpg';
                    nameLabel.textContent = p1.name;
                }
            } else {
                nameLabel.textContent = "READY TO SING";
                roundLabel.textContent = "WAITING FOR NEXT PERFORMER";
                solo.style.display = 'flex';
                battle.style.display = 'none';
                hud.style.display = 'none';
            }
        }

        async function getParticipant(id) {
            const doc = await db.collection('participants').doc(id).get();
            return doc.data();
        }

        function getRoundName(r) {
            const names = ["", "SOLO SINGING", "DUET ROUND", "BATTLE: RAAJA vs RAHMAN", "OPTIONAL ROUND", "GRAND FINALE"];
            return names[r] || "SPECIAL ROUND";
        }

        db.collection('live_votes').onSnapshot(snap => {
            document.getElementById('total-voters').textContent = `${snap.size} VOTES RECEIVED`;
        });
    </script>
</body>
</html>
