<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WALL OF FAME | HELLO MACHI SUPER SINGER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #FFD700; --gold-dark: #B8860B; --bg-dark: #050508; --primary: #FF1493; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Outfit',sans-serif; background:var(--bg-dark); color:white; overflow:hidden; height:100vh; }

        /* Stage */
        .stage-bg { position:fixed; inset:0; background:radial-gradient(circle at 50% 30%, #1a0830 0%, #050508 70%); z-index:0; }
        .spotlight { position:absolute; width:22vw; height:100vh; background:linear-gradient(to top,rgba(255,215,0,0.07),transparent); top:0; transform-origin:top center; animation:sweep 12s infinite alternate ease-in-out; clip-path:polygon(50% 0%,0% 100%,100% 100%); }
        .spotlight:nth-child(2) { animation-delay:-6s; }
        .spotlight:nth-child(3) { animation-delay:-3s; }
        @keyframes sweep { from{transform:rotate(-25deg)} to{transform:rotate(25deg)} }
        .star { position:absolute; border-radius:50%; background:var(--gold); opacity:0; animation:twinkle var(--d,4s) infinite var(--delay,0s); }
        @keyframes twinkle { 0%,100%{opacity:0;transform:scale(0.4)} 50%{opacity:0.9;transform:scale(1)} }

        /* Layout */
        .page { position:relative; z-index:10; height:100vh; display:flex; flex-direction:column; padding:20px 28px; }

        /* Header */
        .header { display:flex; align-items:center; justify-content:center; gap:40px; margin-bottom:15px; }
        .header-text { font-size:clamp(1.2rem,4vw,2.4rem); font-weight:900; letter-spacing:4px; background:linear-gradient(to bottom,#FFD700,#FFFACD,#B8860B); -webkit-background-clip:text; -webkit-text-fill-color:transparent; margin:0; }
        .logo-img { width:85px; height:85px; border-radius:50%; border:3px solid var(--gold); object-fit:cover; box-shadow:0 0 20px var(--gold),0 0 50px rgba(255,215,0,0.3); animation:logoPulse 3s ease-in-out infinite; }
        @keyframes logoPulse { 0%,100%{box-shadow:0 0 18px var(--gold),0 0 40px rgba(255,215,0,0.2)} 50%{box-shadow:0 0 35px var(--gold),0 0 80px rgba(255,215,0,0.5)} }
        .round-badge { display:inline-block; background:var(--primary); padding:4px 22px; border-radius:50px; font-weight:900; font-size:0.85rem; box-shadow:0 0 16px var(--primary); animation:bPulse 2s infinite; position:absolute; bottom:-10px; left:50%; transform:translateX(-50%); z-index:2; }
        @keyframes bPulse { 0%,100%{box-shadow:0 0 14px var(--primary)} 50%{box-shadow:0 0 32px var(--primary),0 0 60px rgba(255,20,147,0.4)} }

        /* Grids */
        .wall-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(155px,1fr)); gap:14px; overflow-y:auto; padding:6px; flex-grow:1; align-content:start; }
        .split-container { display:none; flex-direction:row; flex-grow:1; gap:20px; overflow:hidden; padding-bottom:10px; }
        .split-zone { display:flex; flex-direction:column; border:2px dashed rgba(255,255,255,0.08); border-radius:20px; padding:14px; background:rgba(255,255,255,0.02); min-width: 200px; transition: flex 0.5s ease; }
        .zone-header { padding:8px 15px; border-radius:12px; font-weight:900; letter-spacing:2px; margin-bottom:12px; align-self:stretch; text-align:center; }
        .zone-selected .zone-header { background:rgba(255,215,0,0.1); color:var(--gold); border:1px solid rgba(255,215,0,0.3); }
        .zone-waitlisted .zone-header { background:rgba(0,191,255,0.1); color:#00BFFF; border:1px solid rgba(0,191,255,0.3); }
        .zone-eliminated .zone-header { background:rgba(255,20,147,0.1); color:var(--primary); border:1px solid rgba(255,20,147,0.3); }
        .zone-header { text-align:center; padding:8px 12px; border-radius:10px; font-weight:900; font-size:1.1rem; text-transform:uppercase; letter-spacing:2px; margin-bottom:12px; }
        .zone-selected { border-color:rgba(255,215,0,0.35); }
        .zone-selected .zone-header { background:rgba(255,215,0,0.12); color:var(--gold); }
        .zone-waitlisted { border-color:rgba(0,255,255,0.35); }
        .zone-waitlisted .zone-header { background:rgba(0,255,255,0.12); color:#00ffff; }
        .zone-eliminated { border-color:rgba(255,0,0,0.35); }
        .zone-eliminated .zone-header { background:rgba(255,0,0,0.12); color:#ff4d4d; }
        .zone-scroll { overflow-y:auto; flex:1; }

        /* Cards */
        .p-card { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.1); border-radius:16px; padding:14px; text-align:center; backdrop-filter:blur(8px); animation:cardPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both; position:relative; transition:transform 0.2s,box-shadow 0.2s; }
        .p-card:hover { transform:translateY(-4px); box-shadow:0 14px 32px rgba(0,0,0,0.5); }
        @keyframes cardPop { 0%{transform:scale(0.4);opacity:0} 100%{transform:scale(1);opacity:1} }
        .p-card.selected { border-color:rgba(255,215,0,0.45); box-shadow:0 0 18px rgba(255,215,0,0.15); background:linear-gradient(135deg,rgba(255,215,0,0.07),rgba(0,0,0,0.5)); }
        .p-card.finalist { border-color:var(--primary); box-shadow:0 0 22px rgba(255,20,147,0.3); background:linear-gradient(135deg,rgba(255,20,147,0.09),rgba(0,0,0,0.5)); animation:cardPop 0.5s cubic-bezier(0.175,0.885,0.32,1.275) both,pglow 2s infinite alternate; }
        @keyframes pglow { from{box-shadow:0 0 14px rgba(255,20,147,0.3)} to{box-shadow:0 0 38px rgba(255,20,147,0.7)} }
        .p-card.eliminated { opacity:0.42; filter:grayscale(1); }
        .p-avatar { width:95px; height:95px; border-radius:50%; border:3px solid var(--gold); margin:0 auto 10px; object-fit:cover; display:block; box-shadow:0 0 10px rgba(255,215,0,0.35); }
        .p-placeholder { width:95px; height:95px; border-radius:50%; border:3px solid var(--gold); margin:0 auto 10px; background:linear-gradient(135deg,#2a1a3a,#1a0830); display:flex; align-items:center; justify-content:center; font-size:2.2rem; color:var(--gold); box-shadow:0 0 10px rgba(255,215,0,0.35); }
        .p-name { font-weight:900; font-size:0.95rem; color:var(--gold); margin-bottom:3px; }
        .p-id { font-family:monospace; font-size:0.6rem; color:rgba(255,215,0,0.6); margin-bottom:4px; }
        .p-city { font-size:0.7rem; opacity:0.55; letter-spacing:0.5px; }
        .p-badge { position:absolute; top:8px; right:8px; font-size:0.52rem; font-weight:900; padding:3px 7px; border-radius:7px; letter-spacing:0.5px; }
        .badge-gold { background:var(--gold); color:#000; }
        .badge-pink { background:var(--primary); color:#000; }
        .badge-grey { background:#333; color:#888; }
        .badge-blue { background:rgba(0,210,255,0.15); color:#00d2ff; border:1px solid #00d2ff; }

        /* Reveal overlay */
        #reveal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.94); z-index:2000; display:none; align-items:center; justify-content:center; }
        
        .reveal-card { width:min(420px,90vw); padding:45px 35px; border-radius:28px; text-align:center; color:#000; animation:bigPop 0.7s cubic-bezier(0.175,0.885,0.32,1.275); }
        .reveal-card.card-selected { background:linear-gradient(135deg,#FFD700,#FFA500,#B8860B); box-shadow:0 0 80px var(--gold),0 0 160px rgba(255,215,0,0.4); }
        .reveal-card.card-eliminated { background:linear-gradient(135deg,#5a0000,#ff0000,#8b0000); color:white; box-shadow:0 0 80px #ff0000,0 0 160px rgba(255,0,0,0.4); }
        .reveal-card.card-waitlisted { background:linear-gradient(135deg,#008b8b,#00ffff,#00ced1); color:black; box-shadow:0 0 80px #00ffff,0 0 160px rgba(0,255,255,0.4); }

        @keyframes bigPop { 0%{transform:scale(0.3) rotate(-6deg);opacity:0} 100%{transform:scale(1) rotate(0);opacity:1} }
        .reveal-card img { width:150px; height:150px; border-radius:50%; border:6px solid #fff; display:block; margin:16px auto; object-fit:cover; box-shadow:0 8px 25px rgba(0,0,0,0.4); }

        /* Flash */
        .flash { position:fixed; inset:0; background:#fff; z-index:3000; opacity:0; pointer-events:none; }
        .flash.on { animation:flashfx 0.4s ease-out forwards; }
        @keyframes flashfx { 0%{opacity:1} 100%{opacity:0} }

        /* Setup */
        #setup-overlay { position:fixed; inset:0; background:linear-gradient(135deg,#050508,#1a0830); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:18px; }
        .btn-start { background:linear-gradient(135deg,#FFD700,#B8860B); color:#000; border:none; padding:18px 56px; font-size:1.3rem; font-weight:900; border-radius:50px; cursor:pointer; box-shadow:0 0 28px rgba(255,215,0,0.5); transition:transform 0.2s; font-family:'Outfit',sans-serif; }
        .btn-start:hover { transform:scale(1.05); }

        /* Mobile */
        @media(max-width:768px){
            body { overflow-y: auto; height: auto; }
            .page { padding:10px; height: auto; min-height: 100dvh; }
            .logo-img { width:52px; height:52px; }
            .header { gap:12px; margin-bottom: 30px; }
            .header-text { font-size:1.1rem; letter-spacing:1px; }
            .round-badge { font-size: 0.75rem; padding: 3px 15px; bottom: -20px; }
            .split-container { flex-direction:column; overflow:visible; gap: 40px; }
            .split-zone { min-width:0; flex:none !important; min-height: 300px; }
            .wall-grid { grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:8px; overflow: visible; }
            .p-avatar,.p-placeholder { width:70px; height:70px; font-size:1.6rem; }
            .p-name { font-size:0.8rem; }
            .reveal-card { padding:28px 18px; width: 95%; }
            .reveal-card img { width:110px; height:110px; }
        }
    </style>
</head>
<body>

<div id="setup-overlay">
    <img src="logo.jpg" style="width:88px;height:88px;border-radius:50%;border:3px solid var(--gold);box-shadow:0 0 25px var(--gold);object-fit:cover;">
    <h1 style="font-size:2.2rem;font-weight:900;letter-spacing:6px;background:linear-gradient(to bottom,#FFD700,#B8860B);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">WALL OF FAME</h1>
    <p style="color:#777;letter-spacing:2px;font-size:0.9rem;">Hello Machi Super Singer 2026</p>
    <button class="btn-start" onclick="startPortal()"><i class="fa-solid fa-star"></i> ENTER SELECTION STAGE</button>
</div>

<div class="stage-bg" id="stage-bg">
    <div class="spotlight" style="left:8%;"></div>
    <div class="spotlight" style="left:80%;"></div>
    <div class="spotlight" style="left:44%;"></div>
</div>
<div class="flash" id="flash"></div>

<div class="page">
    <div class="header" style="position:relative;">
        <h1 class="header-text">HELLO MACHI</h1>
        <img src="logo.jpg" class="logo-img" alt="Hello Machi FM">
        <h1 class="header-text">SUPER SINGER</h1>
        <div id="round-label" class="round-badge">SELECTION PHASE</div>
    </div>
    <div id="main-grid" class="wall-grid"></div>
    <div id="split-view" class="split-container">
        <div class="split-zone zone-selected">
            <div class="zone-header"><i class="fa-solid fa-star"></i> SELECTED / ADVANCED</div>
            <div id="selected-grid" class="wall-grid" style="padding:0;flex-grow:1;"></div>
        </div>
        <div class="split-zone zone-waitlisted">
            <div class="zone-header"><i class="fa-solid fa-hourglass-half"></i> WAITLISTED</div>
            <div id="waitlisted-grid" class="wall-grid" style="padding:0;flex-grow:1;"></div>
        </div>
        <div class="split-zone zone-eliminated">
            <div class="zone-header"><i class="fa-solid fa-xmark"></i> ELIMINATED</div>
            <div id="eliminated-grid" class="wall-grid" style="padding:0;flex-grow:1;"></div>
        </div>
    </div>
</div>

<div id="reveal-overlay">
    <button id="unmute-btn" onclick="unmuteAudio()" style="display:none; position:absolute; top:20px; right:20px; background:var(--primary); color:black; font-weight:bold; border:none; padding:10px 20px; border-radius:10px; z-index:99999; font-size:1.2rem; cursor:pointer; box-shadow:0 0 15px var(--primary);"><i class="fa-solid fa-volume-high"></i> UNMUTE SOUND</button>
    <div class="reveal-card" id="reveal-card">
        <i id="reveal-icon" class="fa-solid fa-trophy fa-3x"></i>
        <h3 id="reveal-title" style="font-size:1.1rem;letter-spacing:3px;margin:14px 0 0;">CONGRATULATIONS!</h3>
        <img id="reveal-img" src="" alt="">
        <h2 id="reveal-name" style="font-size:1.9rem;font-weight:900;"></h2>
        <div id="reveal-status" style="margin-top:12px;font-weight:900;font-size:1rem;border-top:2px solid rgba(0,0,0,0.2);padding-top:12px;"></div>
    </div>
</div>

<audio id="audio-selected" src="https://assets.mixkit.co/active_storage/sfx/2000/2000-preview.mp3" preload="auto"></audio>
<audio id="audio-eliminated" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3" preload="auto"></audio>
<audio id="audio-waitlisted" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3" preload="auto"></audio>
<audio id="audio-round1" src="https://assets.mixkit.co/active_storage/sfx/2013/2013-preview.mp3" preload="auto"></audio>
<audio id="audio-round2" src="https://assets.mixkit.co/active_storage/sfx/2019/2019-preview.mp3" preload="auto"></audio>
<audio id="audio-round3" src="https://assets.mixkit.co/active_storage/sfx/2014/2014-preview.mp3" preload="auto"></audio>
<audio id="audio-winner" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>
<audio id="audio-runnerup" src="https://assets.mixkit.co/active_storage/sfx/1434/1434-preview.mp3" preload="auto"></audio>

<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.2/dist/confetti.browser.min.js"></script>
<script src="firebase-config.js"></script>
<script>
    // Spawn stars
    const bg = document.getElementById('stage-bg');
    for (let i = 0; i < 45; i++) {
        const s = document.createElement('div');
        s.className = 'star';
        const sz = Math.random() * 3 + 1;
        s.style.cssText = `width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${3+Math.random()*5}s;--delay:${Math.random()*6}s;`;
        bg.appendChild(s);
    }

    let knownIds = new Set();
    let lastReveal = null;

    function startPortal() {
        document.getElementById('setup-overlay').style.display = 'none';
        initSync();
    }

    function flash() {
        const f = document.getElementById('flash');
        f.classList.remove('on'); void f.offsetWidth; f.classList.add('on');
    }

    function showReveal(p) {
        if (lastReveal === p.id) return;
        lastReveal = p.id;
        flash();
        
        const card = document.getElementById('reveal-card');
        const icon = document.getElementById('reveal-icon');
        const title = document.getElementById('reveal-title');
        const statusText = document.getElementById('reveal-status');
        const overlay = document.getElementById('reveal-overlay');
        const statusLower = (p.status || '').toLowerCase();

        // Reset classes
        card.className = 'reveal-card';
        overlay.style.background = 'rgba(0,0,0,0.94)';

        let audioPromise;
        if (statusLower === 'eliminated') {
            card.classList.add('card-eliminated');
            icon.className = 'fa-solid fa-heart-crack fa-3x';
            title.textContent = 'HARD LUCK!';
            statusText.textContent = 'ELIMINATED';
            overlay.style.background = 'rgba(100,0,0,0.9)';
            audioPromise = document.getElementById('audio-eliminated').play();
        } else if (statusLower === 'waitlisted') {
            card.classList.add('card-waitlisted');
            icon.className = 'fa-solid fa-hourglass-half fa-3x';
            title.textContent = 'HANG TIGHT!';
            statusText.textContent = 'WAITLISTED';
            audioPromise = document.getElementById('audio-waitlisted').play();
        } else if (statusLower === 'winner' || statusLower.includes('runner up')) {
            card.classList.add('card-selected');
            icon.className = 'fa-solid fa-crown fa-3x';
            icon.style.color = 'var(--gold)';
            title.textContent = 'GRAND FINALE';
            statusText.textContent = (p.status || '').toUpperCase();
            
            audioPromise = document.getElementById(statusLower === 'winner' ? 'audio-winner' : 'audio-runnerup').play();
            
            // The Great Bang! Massive confetti explosion from both sides
            const duration = 3000;
            const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 15, angle: 60, spread: 55, origin: { x: 0 }, colors: ['#FFD700','#B8860B','#fff'] });
                confetti({ particleCount: 15, angle: 120, spread: 55, origin: { x: 1 }, colors: ['#FFD700','#B8860B','#fff'] });
                if (Date.now() < end) requestAnimationFrame(frame);
            }());

        } else {
            card.classList.add('card-selected');
            icon.className = 'fa-solid fa-trophy fa-3x';
            title.textContent = 'CONGRATULATIONS!';
            statusText.textContent = `ADVANCED TO ${(p.status || '').toUpperCase()}`;
            
            let audioId = 'audio-selected';
            if (statusLower === 'round 1') audioId = 'audio-round1';
            else if (statusLower === 'round 2') audioId = 'audio-round2';
            else if (statusLower === 'round 3') audioId = 'audio-round3';
            
            lastPlayedAudio = audioId;
            audioPromise = document.getElementById(audioId).play();
            confetti({ particleCount: 220, spread: 85, origin: { y: 0.6 }, colors: ['#FFD700','#B8860B','#fff','#FF1493'] });
        }

        if (audioPromise) {
            audioPromise.catch(e => {
                console.log("Audio autoplay blocked by browser", e);
                document.getElementById('unmute-btn').style.display = 'block';
            });
        }

        document.getElementById('reveal-img').src = p.photoBase64 || 'logo.jpg';
        document.getElementById('reveal-name').textContent = (p.name || '').toUpperCase();
        overlay.style.display = 'flex';
        
        setTimeout(() => { 
            overlay.style.display = 'none'; 
            document.getElementById('unmute-btn').style.display = 'none';
        }, 7000);
    }

    let lastPlayedAudio = null;
    function unmuteAudio() {
        document.getElementById('unmute-btn').style.display = 'none';
        if (lastPlayedAudio) {
            document.getElementById(lastPlayedAudio).play().catch(e=>console.log(e));
        } else {
            document.getElementById('audio-selected').play().catch(e=>console.log(e));
        }
    }

    function badgeClass(s) {
        if (!s) return 'badge-blue';
        const l = s.toLowerCase();
        if (l === 'final') return 'badge-pink';
        if (l === 'eliminated') return 'badge-grey';
        if (['approved','round 1','round 2','round 3'].includes(l)) return 'badge-gold';
        return 'badge-blue';
    }

    function cardClass(s) {
        if (!s) return 'selected';
        const l = s.toLowerCase();
        if (l === 'eliminated') return 'eliminated';
        if (l === 'final') return 'finalist';
        return 'selected';
    }

    function makeCard(p, i) {
        const d = document.createElement('div');
        d.className = `p-card ${cardClass(p.status)}`;
        d.style.animationDelay = `${i * 0.055}s`;
        const photo = p.photoBase64
            ? `<img src="${p.photoBase64}" class="p-avatar" alt="${p.name || ''}">`
            : `<div class="p-placeholder">${(p.name || '?').charAt(0)}</div>`;
        d.innerHTML = `
            <span class="p-badge ${badgeClass(p.status)}">${(p.status || '').toUpperCase()}</span>
            ${photo}
            <div class="p-name">${p.name || 'Unknown'}</div>
            <div class="p-id">ID: ${p.participantId || '---'}</div>
            <div class="p-city"><i class="fa-solid fa-location-dot"></i> ${p.city || 'Tamil Nadu'}</div>
        `;
        return d;
    }

    function renderWall(list) {
        const mainGrid = document.getElementById('main-grid');
        const splitView = document.getElementById('split-view');
        const selGrid = document.getElementById('selected-grid');
        const waitGrid = document.getElementById('waitlisted-grid');
        const elGrid = document.getElementById('eliminated-grid');

        const elim = list.filter(p => (p.status || '').toLowerCase() === 'eliminated');
        const wait = list.filter(p => (p.status || '').toLowerCase() === 'waitlisted');
        const active = list.filter(p => !['eliminated', 'waitlisted'].includes((p.status || '').toLowerCase()));

        if (currentWofFilter === 'grand_finale') {
            splitView.style.display = 'none';
            mainGrid.style.display = 'flex';
            mainGrid.style.justifyContent = 'center';
            mainGrid.style.alignItems = 'center';
            mainGrid.style.gap = '40px';
            mainGrid.innerHTML = '';
            
            // Order: Runner Up 1, Winner, Runner Up 2
            const winner = list.find(p => (p.status || '').toLowerCase() === 'winner');
            const ru1 = list.find(p => (p.status || '').toLowerCase() === 'runner up 1');
            const ru2 = list.find(p => (p.status || '').toLowerCase() === 'runner up 2');
            
            if (ru1) mainGrid.appendChild(makeCard(ru1, 0));
            if (winner) {
                const wCard = makeCard(winner, 1);
                wCard.style.transform = 'scale(1.3)';
                wCard.style.zIndex = '10';
                mainGrid.appendChild(wCard);
            }
            if (ru2) mainGrid.appendChild(makeCard(ru2, 2));

        } else if (currentWofFilter === 'all_everyone' || elim.length > 0 || wait.length > 0) {
            mainGrid.style.display = 'none';
            mainGrid.style.justifyContent = 'start';
            mainGrid.style.alignItems = 'start';
            splitView.style.display = 'flex'; // changed to flex from grid
            
            selGrid.innerHTML = ''; active.forEach((p, i) => selGrid.appendChild(makeCard(p, i)));
            waitGrid.innerHTML = ''; wait.forEach((p, i) => waitGrid.appendChild(makeCard(p, i)));
            elGrid.innerHTML = ''; elim.forEach((p, i) => elGrid.appendChild(makeCard(p, i)));

            // Dynamic Proportional Partitioning
            const selWeight = Math.max(active.length, 1);
            const waitWeight = Math.max(wait.length, 0.5);
            const elimWeight = Math.max(elim.length, 0.5);

            selGrid.parentElement.style.flex = `${selWeight} 1 0%`;
            waitGrid.parentElement.style.flex = `${waitWeight} 1 0%`;
            elGrid.parentElement.style.flex = `${elimWeight} 1 0%`;

            // Hide empty zones dynamically
            selGrid.parentElement.style.display = active.length > 0 ? 'flex' : 'none';
            waitGrid.parentElement.style.display = wait.length > 0 ? 'flex' : 'none';
            elGrid.parentElement.style.display = elim.length > 0 ? 'flex' : 'none';
        } else {
            splitView.style.display = 'none';
            mainGrid.style.display = 'grid';
            mainGrid.style.justifyContent = 'start';
            mainGrid.style.alignItems = 'start';
            mainGrid.innerHTML = ''; active.forEach((p, i) => mainGrid.appendChild(makeCard(p, i)));
        }
    }

    let isInitialLoad = true;
    let revealedState = new Map();
    let currentWofFilter = 'all_active';
    let currentParticipants = [];

    function initSync() {
        db.collection('live_state').doc('current').onSnapshot(doc => {
            if (doc.exists) {
                const d = doc.data();
                document.getElementById('round-label').textContent = d.round
                    ? `CURRENT: ${d.round.toUpperCase()}` : 'SELECTION PHASE';
                
                if (d.wallOfFameFilter && d.wallOfFameFilter !== currentWofFilter) {
                    currentWofFilter = d.wallOfFameFilter;
                    applyFilterAndRender();
                }
            }
        });

        db.collection('participants').onSnapshot(snap => {
            currentParticipants = [];
            snap.forEach(doc => currentParticipants.push({ id: doc.id, ...doc.data() }));
            
            applyFilterAndRender();
        });
    }

    function applyFilterAndRender() {
        // Only show candidates who are strictly revealed and not pending
        let visible = currentParticipants.filter(p => p.isRevealed === true && p.status && p.status !== 'pending');

        // Apply admin display filter
        if (currentWofFilter === 'all_everyone') {
            // Keep everyone who is revealed (already filtered above)
        } else if (currentWofFilter === 'grand_finale') {
            visible = visible.filter(p => ['winner', 'runner up 1', 'runner up 2'].includes((p.status || '').toLowerCase()));
        } else if (currentWofFilter === 'all_active') {
            visible = visible.filter(p => !['eliminated', 'waitlisted'].includes((p.status || '').toLowerCase()));
        } else if (currentWofFilter) {
            // If filtering by a specific round (e.g. "Round 1"), 
            // show the people in that round PLUS all waitlisted/eliminated people
            visible = visible.filter(p => {
                const s = (p.status || '').toLowerCase();
                const f = currentWofFilter.toLowerCase();
                return s === f || s === 'waitlisted' || s === 'eliminated';
            });
        }

        // Trigger big reveal for newly isRevealed participants
        visible.forEach(p => {
            // If it's not the initial page load, and the participant is newly revealed, show it!
            if (!isInitialLoad && p.isRevealed === true && revealedState.get(p.id) !== true) {
                setTimeout(() => showReveal(p), 600);
            }
            // Track their current reveal state
            revealedState.set(p.id, p.isRevealed === true);
        });
        
        isInitialLoad = false; // After first load, any changes can trigger a reveal

        renderWall(visible);
    }
</script>
</body>
