<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CONSOLIDATED MARKS | HELLO MACHI SUPER SINGER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #FF1493; --gold: #FFD700; --bg-dark: #050508; --glass: rgba(255, 255, 255, 0.05); }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: 'Outfit', sans-serif; background: var(--bg-dark); color: white; min-height: 100vh; padding-bottom: 50px; }
        
        .container { max-width: 1300px; margin: 0 auto; padding: 20px; }
        
        header { text-align: center; margin-bottom: 30px; padding: 30px 0; border-bottom: 1px solid var(--glass); }
        .logo { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); margin-bottom: 12px; }
        h1 { font-size: 2.2rem; font-weight: 900; letter-spacing: 4px; background: linear-gradient(to bottom, #FFD700, #B8860B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .table-wrapper { background: var(--glass); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); overflow-x: auto; backdrop-filter: blur(10px); margin-bottom: 40px; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid rgba(255, 255, 255, 0.05); vertical-align: middle; }
        th { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; background: rgba(0,0,0,0.3); }
        
        .singer-cell { display: flex; align-items: center; gap: 12px; }
        .singer-img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid var(--gold); }
        .singer-info b { font-size: 0.95rem; color: #fff; display: block; }
        .singer-info p { font-size: 0.7rem; color: #666; font-family: monospace; }

        .round-box { background: rgba(255, 255, 255, 0.03); border-radius: 12px; padding: 10px; margin-bottom: 5px; border: 1px solid rgba(255,255,255,0.05); }
        .round-name { font-size: 0.7rem; font-weight: 900; color: var(--primary); text-transform: uppercase; margin-bottom: 4px; display: block; border-bottom: 1px solid rgba(255,20,147,0.2); padding-bottom: 2px; }
        .round-scores { font-size: 0.75rem; color: #ccc; }
        .round-scores span { color: #888; font-weight: 400; }
        
        .score-avg { font-weight: 700; color: #fff; font-size: 0.9rem; }
        .total-sum { font-weight: 900; font-size: 1.4rem; color: var(--gold); text-shadow: 0 0 10px rgba(255,215,0,0.3); }
        
        .rank-badge { display: inline-flex; align-items: center; justify-content: center; width: 30px; height: 30px; border-radius: 50%; background: rgba(255,255,255,0.1); font-weight: 900; font-size: 0.85rem; }
        .rank-1 { background: var(--gold); color: black; box-shadow: 0 0 15px var(--gold); }
        .rank-2 { background: #C0C0C0; color: black; }
        .rank-3 { background: #CD7F32; color: black; }

        .tie-highlight { background: rgba(255, 20, 147, 0.08) !important; border-left: 4px solid var(--primary); }
        .tie-reason { font-size: 0.65rem; color: var(--primary); display: block; font-weight: 600; margin-top: 4px; }

        .loading-state { text-align: center; padding: 80px 0; }
        .fa-spin { font-size: 2.5rem; color: var(--primary); }

        @keyframes fadeIn { from{opacity:0; transform:translateY(15px)} to{opacity:1; transform:translateY(0)} }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            h1 { font-size: 1.6rem; }
            th, td { padding: 10px 8px; font-size: 0.8rem; }
            .round-box { padding: 6px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <img src="logo.jpg" class="logo" alt="Hello Machi">
            <h1>CONSOLIDATED MARKS</h1>
            <p style="color:#666; letter-spacing:2px; margin-top:8px;">ALL STAGES & CUMULATIVE STANDINGS</p>
        </header>

        <div id="results-container">
            <div class="loading-state">
                <i class="fa-solid fa-spinner fa-spin"></i>
                <p style="margin-top:20px; color:#888;">Fetching consolidated performance data...</p>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        async function fetchAndRender() {
            const container = document.getElementById('results-container');
            
            try {
                // 1. Fetch all participants to have names/photos
                const pSnap = await db.collection('participants').get();
                const pMap = {};
                pSnap.forEach(doc => pMap[doc.id] = { id: doc.id, ...doc.data() });

                // 2. Fetch ALL historical round results
                const rSnap = await db.collection('round_results').orderBy('timestamp', 'asc').get();
                
                // Group results by Singer ID
                const singerStats = {};
                rSnap.forEach(doc => {
                    const data = doc.data();
                    const sId = data.singerId;
                    if (!singerStats[sId]) {
                        singerStats[sId] = {
                            id: sId,
                            name: data.singerName || (pMap[sId] ? pMap[sId].name : 'Unknown'),
                            photo: pMap[sId] ? pMap[sId].photoBase64 : 'logo.jpg',
                            participantId: pMap[sId] ? pMap[sId].participantId : '---',
                            rounds: [],
                            cumulativeTotal: 0,
                            maxIndividualJudgeScore: 0
                        };
                    }

                    // Calculate average for this round
                    const scores = Object.values(data.judgeScores || {});
                    const jAvg = scores.length > 0 ? (scores.reduce((a,b)=>a+b,0)/scores.length) : 0;
                    const peak = scores.length > 0 ? Math.max(...scores) : 0;
                    if (peak > singerStats[sId].maxIndividualJudgeScore) {
                        singerStats[sId].maxIndividualJudgeScore = peak;
                    }

                    const aAvg = data.audienceAvg || 0;
                    const roundTotal = (jAvg * 0.6) + (aAvg * 0.4);

                    singerStats[sId].rounds.push({
                        name: data.round,
                        judgeScores: data.judgeScores,
                        jAvg,
                        aAvg,
                        total: roundTotal
                    });

                    singerStats[sId].cumulativeTotal += roundTotal;
                });

                const sortedSingers = Object.values(singerStats).sort((a, b) => {
                    // Rank by Cumulative Total
                    if (Math.abs(b.cumulativeTotal - a.cumulativeTotal) < 0.01) {
                        // Tie-breaker: Highest individual judge score across any round
                        return b.maxIndividualJudgeScore - a.maxIndividualJudgeScore;
                    }
                    return b.cumulativeTotal - a.cumulativeTotal;
                });

                let tableHtml = `
                    <div class="table-wrapper">
                        <table>
                            <thead>
                                <tr>
                                    <th width="70">Rank</th>
                                    <th width="250">Singer</th>
                                    <th>Stage-wise Performance (Judge & Audience)</th>
                                    <th width="150" style="text-align:center;">Cumulative Score</th>
                                </tr>
                            </thead>
                            <tbody>
                `;

                sortedSingers.forEach((s, i) => {
                    const isTie = i > 0 && Math.abs(s.cumulativeTotal - sortedSingers[i-1].cumulativeTotal) < 0.1;
                    const wasTie = i < sortedSingers.length - 1 && Math.abs(s.cumulativeTotal - sortedSingers[i+1].cumulativeTotal) < 0.1;
                    const needsHighlight = isTie || wasTie;
                    
                    const rankClass = (i === 0) ? 'rank-1' : (i === 1) ? 'rank-2' : (i === 2) ? 'rank-3' : '';

                    let roundsHtml = '';
                    s.rounds.forEach(r => {
                        roundsHtml += `
                            <div class="round-box">
                                <span class="round-name">${r.name}</span>
                                <div class="round-scores">
                                    <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                                        <div>
                                            <span>Judges:</span> 
                                            ${Object.entries(r.judgeScores).map(([n, v]) => `${n.charAt(0)}: ${v.toFixed(1)}`).join(' | ')}
                                        </div>
                                        <div class="score-avg">J: ${r.jAvg.toFixed(2)}</div>
                                    </div>
                                    <div style="display:flex; justify-content:space-between;">
                                        <div><span>Audience:</span> ${r.aAvg.toFixed(2)}</div>
                                        <div class="score-avg" style="color:var(--gold);">Subtotal: ${r.total.toFixed(2)}</div>
                                    </div>
                                </div>
                            </div>
                        `;
                    });

                    tableHtml += `
                        <tr class="${needsHighlight ? 'tie-highlight' : ''}">
                            <td><span class="rank-badge ${rankClass}">${i + 1}</span></td>
                            <td>
                                <div class="singer-cell">
                                    <img src="${s.photo || 'logo.jpg'}" class="singer-img">
                                    <div class="singer-info">
                                        <b>${s.name.toUpperCase()}</b>
                                        <p>${s.participantId}</p>
                                    </div>
                                </div>
                            </td>
                            <td>${roundsHtml}</td>
                            <td style="text-align:center;">
                                <div class="total-sum">${s.cumulativeTotal.toFixed(2)}</div>
                                ${needsHighlight ? `<span class="tie-reason">TIE-BREAKER: PEAK ${s.maxIndividualJudgeScore.toFixed(1)}</span>` : ''}
                            </td>
                        </tr>
                    `;
                });

                tableHtml += `</tbody></table></div>`;
                container.innerHTML = tableHtml;

                if (sortedSingers.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:50px; color:#666;">No historical round data found. Ensure scores are submitted in the admin panel.</div>';
                }

            } catch (err) {
                console.error(err);
                container.innerHTML = `<div style="text-align:center; padding:50px; color:red;">Error loading consolidated marks: ${err.message}</div>`;
            }
        }

        fetchAndRender();
        // Auto refresh every 60 seconds
        setInterval(fetchAndRender, 60000);
    </script>
</body>
</html>
