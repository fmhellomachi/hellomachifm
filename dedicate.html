<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dedicate a Song | Hello Machi FM</title>
    <link rel="stylesheet" href="styles.css?v=2">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Outfit:wght@300;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #0a0a12;
            --card-glass: rgba(255,255,255,0.03);
            --border-glass: rgba(255,255,255,0.08);
            --gold: #FFD700;
            --pink: #FF69B4;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg-dark);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            padding-bottom: 80px;
        }
        .navbar {
            background: rgba(10,10,15,0.9);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--border-glass);
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .navbar .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .navbar .logo img {
            width: 42px; height: 42px; border-radius: 50%; object-fit: cover;
        }
        .navbar .logo span {
            font-weight: 800; font-size: 1.2rem;
        }
        .navbar .logo .fm { color: var(--gold); }
        .navbar .nav-links { display: flex; gap: 16px; align-items: center; }
        .navbar .nav-links a {
            color: rgba(255,255,255,0.6); text-decoration: none; font-weight: 600; font-size: 0.85rem; transition: 0.3s;
        }
        .navbar .nav-links a:hover { color: #fff; }
        .container {
            max-width: 720px; margin: 0 auto; padding: 30px 20px 80px;
        }
        h1 {
            font-size: 2rem; font-weight: 800; margin-bottom: 6px;
        }
        h1 span { background: linear-gradient(135deg, var(--gold), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        .subtitle { color: rgba(255,255,255,0.4); font-size: 0.95rem; margin-bottom: 30px; }
        .card {
            background: var(--card-glass); border: 1px solid var(--border-glass);
            border-radius: 20px; padding: 24px; margin-bottom: 20px;
            backdrop-filter: blur(10px);
        }
        .card h3 { font-size: 1rem; font-weight: 700; margin-bottom: 16px; color: var(--gold); }
        .search-box {
            display: flex; gap: 10px; margin-bottom: 16px;
        }
        .search-box input {
            flex: 1; padding: 14px 18px; border-radius: 14px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            color: #fff; font-size: 0.95rem; outline: none; transition: 0.3s;
        }
        .search-box input:focus { border-color: var(--gold); }
        .search-box input::placeholder { color: rgba(255,255,255,0.3); }
        .search-box button {
            padding: 14px 24px; border-radius: 14px; border: none;
            background: var(--gold); color: #000; font-weight: 800; cursor: pointer;
            font-size: 0.9rem; transition: 0.2s; white-space: nowrap;
        }
        .search-box button:hover { transform: scale(1.02); }
        .search-box button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .results-count { font-size: 0.8rem; color: rgba(255,255,255,0.3); margin-bottom: 12px; }
        .song-list { display: flex; flex-direction: column; gap: 8px; max-height: 340px; overflow-y: auto; padding-right: 4px; }
        .song-list::-webkit-scrollbar { width: 4px; }
        .song-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .song-item {
            display: flex; align-items: center; gap: 12px; padding: 12px 16px;
            background: rgba(255,255,255,0.02); border: 1px solid var(--border-glass);
            border-radius: 14px; cursor: pointer; transition: 0.2s;
        }
        .song-item:hover { background: rgba(255,255,255,0.06); border-color: rgba(255,215,0,0.2); }
        .song-item.selected { border-color: var(--gold); background: rgba(255,215,0,0.06); }
        .song-item img {
            width: 44px; height: 44px; border-radius: 10px; object-fit: cover;
            background: rgba(255,255,255,0.05);
        }
        .song-item .info { flex: 1; min-width: 0; }
        .song-item .info .title { font-weight: 700; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .song-item .info .artist { font-size: 0.75rem; color: rgba(255,255,255,0.4); }
        .song-item .check {
            width: 24px; height: 24px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.2);
            display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: transparent; transition: 0.2s; flex-shrink: 0;
        }
        .song-item.selected .check { background: var(--gold); border-color: var(--gold); color: #000; }
        .selected-song-card {
            display: none; align-items: center; gap: 14px;
            background: rgba(255,215,0,0.06); border: 1px solid var(--gold);
            border-radius: 16px; padding: 16px; margin-bottom: 20px;
        }
        .selected-song-card img {
            width: 52px; height: 52px; border-radius: 12px; object-fit: cover;
        }
        .selected-song-card .info { flex: 1; }
        .selected-song-card .info .title { font-weight: 800; font-size: 1rem; }
        .selected-song-card .info .artist { font-size: 0.8rem; color: rgba(255,255,255,0.4); }
        .selected-song-card .change-btn {
            background: rgba(255,255,255,0.08); border: 1px solid var(--border-glass);
            color: #fff; padding: 8px 14px; border-radius: 10px; cursor: pointer;
            font-size: 0.75rem; font-weight: 600; transition: 0.2s;
        }
        .selected-song-card .change-btn:hover { background: rgba(255,255,255,0.12); }
        .form-group { margin-bottom: 14px; }
        .form-group label { display: block; font-size: 0.8rem; color: rgba(255,255,255,0.5); margin-bottom: 4px; font-weight: 600; }
        .form-group input, .form-group textarea {
            width: 100%; padding: 12px 16px; border-radius: 12px;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border-glass);
            color: #fff; font-size: 0.9rem; outline: none; transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        .form-group input:focus, .form-group textarea:focus { border-color: var(--gold); }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .template-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
        .template-chip {
            padding: 6px 14px; border-radius: 20px; border: 1px solid var(--border-glass);
            background: rgba(255,255,255,0.03); color: rgba(255,255,255,0.6);
            font-size: 0.75rem; cursor: pointer; transition: 0.2s; font-weight: 600;
        }
        .template-chip:hover { border-color: var(--gold); color: var(--gold); background: rgba(255,215,0,0.05); }
        .submit-btn {
            width: 100%; padding: 16px; border-radius: 14px; border: none;
            background: linear-gradient(135deg, var(--gold), var(--pink)); color: #000;
            font-weight: 800; font-size: 1rem; cursor: pointer; transition: 0.2s;
            margin-top: 6px;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 30px rgba(255,105,180,0.2); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        .status-msg { text-align: center; font-size: 0.85rem; margin-top: 12px; min-height: 24px; }
        .cooldown-bar {
            height: 4px; background: rgba(255,255,255,0.05); border-radius: 4px; margin-top: 12px; overflow: hidden;
        }
        .cooldown-bar .fill {
            height: 100%; background: var(--gold); border-radius: 4px; width: 0%; transition: width 1s linear;
        }
        .back-link {
            display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,0.4);
            text-decoration: none; font-size: 0.85rem; margin-bottom: 20px; transition: 0.2s;
        }
        .back-link:hover { color: #fff; }
        .loading-dots::after {
            content: ''; animation: dots 1.5s steps(3, end) infinite;
        }
        @keyframes dots { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
            .container { padding: 20px 16px 80px; }
            h1 { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">
            <img src="logo.jpg" alt="Hello Machi FM" onerror="this.src='logo.jpg'">
            <span>HELLO MACHI <span class="fm">FM</span></span>
        </div>
        <div class="nav-links">
            <a href="index.html"><i class="fa-solid fa-home"></i> Home</a>
        </div>
    </nav>

    <div class="container">
        <a href="index.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Back to Home</a>
        <h1>Dedicate a <span>Song</span></h1>
        <p class="subtitle">Search for a song, add a personal message, and dedicate it to someone special. It will play live on air!</p>

        <!-- Step 1: Search -->
        <div class="card">
            <h3><i class="fa-solid fa-music"></i> Search Songs</h3>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Type song or artist name..." autofocus>
                <button id="searchBtn"><i class="fa-solid fa-search"></i> Search</button>
            </div>
            <div class="results-count" id="resultsCount">Type at least 2 characters to search</div>
            <div class="song-list" id="songList"></div>
        </div>

        <!-- Step 2: Selected Song -->
        <div class="selected-song-card" id="selectedSongCard">
            <img id="selSongArt" src="logo.jpg" alt="">
            <div class="info">
                <div class="title" id="selSongTitle">-</div>
                <div class="artist" id="selSongArtist">-</div>
            </div>
            <button class="change-btn" id="changeSongBtn"><i class="fa-solid fa-rotate"></i> Change</button>
        </div>

        <!-- Step 3: Dedication Form -->
        <div class="card" id="formCard">
            <h3><i class="fa-solid fa-heart"></i> Your Dedication</h3>
            <div class="form-row">
                <div class="form-group">
                    <label>From (Your Name)</label>
                    <input type="text" id="fromInput" placeholder="Your name">
                </div>
                <div class="form-group">
                    <label>To (Recipient)</label>
                    <input type="text" id="toInput" placeholder="Who is this for?">
                </div>
            </div>
            <div class="form-group">
                <label>Message</label>
                <div class="template-chips">
                    <span class="template-chip" data-msg="Happy Birthday! 🎂">Birthday</span>
                    <span class="template-chip" data-msg="I love you! ❤️">Romantic</span>
                    <span class="template-chip" data-msg="You're the best! 🌟">Friend</span>
                    <span class="template-chip" data-msg="Congratulations! 🎉">Celebrate</span>
                    <span class="template-chip" data-msg="Just thinking of you 💭">Special</span>
                </div>
                <textarea id="msgInput" rows="3" placeholder="Write your dedication message..." maxlength="200"></textarea>
                <div style="text-align:right;font-size:0.7rem;color:rgba(255,255,255,0.3);margin-top:4px;"><span id="charCount">0</span>/200</div>
            </div>
            <button class="submit-btn" id="submitBtn">🎤 Send Dedication</button>
            <div class="status-msg" id="statusMsg"></div>
            <div class="cooldown-bar"><div class="fill" id="cooldownFill"></div></div>
        </div>
    </div>

    <audio id="player" preload="none" crossorigin="anonymous">
        <source src="https://hellomachifm.duckdns.org/listen/hello_machi_fm/radio.mp3" type="audio/mpeg">
    </audio>

    <div class="floating-player-wrapper">
        <div class="floating-player">
            <div class="disk-control-wrapper">
                <button id="play-pause-btn" class="disk-button">
                    <img src="logo.jpg" alt="Disk" id="player-disk-img" class="disk-img">
                    <div class="disk-inner-play">
                        <i class="fa-solid fa-play" id="play-icon"></i>
                    </div>
                </button>
                <div class="tonearm"></div>
            </div>
            <div class="retro-visualizer">
                <div class="vis-block-col">
                    <div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div>
                </div>
                <div class="vis-block-col">
                    <div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div>
                </div>
                <div class="vis-block-col">
                    <div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div>
                </div>
                <div class="vis-block-col">
                    <div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div><div class="vis-block"></div>
                </div>
            </div>
            <div class="player-controls-right">
                <h4 id="now-playing-title">HELLO MACHI FM</h4>
                <div class="volume-group">
                    <i class="fa-solid fa-volume-high" style="color:#666; font-size:0.7rem;"></i>
                    <input type="range" id="volume-slider" class="volume-slider" min="0" max="1" step="0.01" value="0.8">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script>
        const player = document.getElementById('player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const diskImg = document.getElementById('player-disk-img');
        const volumeSlider = document.getElementById('volume-slider');
        const nowPlayingTitle = document.getElementById('now-playing-title');

        let isPlaying = false;

        player.volume = parseFloat(localStorage.getItem('player_volume')) || 0.8;
        volumeSlider.value = player.volume;

        volumeSlider.addEventListener('input', () => {
            player.volume = parseFloat(volumeSlider.value);
            localStorage.setItem('player_volume', volumeSlider.value);
        });

        async function togglePlay() {
            if (player.paused) {
                try {
                    player.src = 'https://hellomachifm.duckdns.org/listen/hello_machi_fm/radio.mp3?t=' + Date.now();
                    player.load();
                    await player.play();
                    isPlaying = true;
                    playIcon.className = 'fa-solid fa-pause';
                    diskImg.style.animationPlayState = 'running';
                } catch {
                    isPlaying = false;
                    playIcon.className = 'fa-solid fa-play';
                    diskImg.style.animationPlayState = 'paused';
                }
            } else {
                player.pause();
                isPlaying = false;
                playIcon.className = 'fa-solid fa-play';
                diskImg.style.animationPlayState = 'paused';
            }
        }

        playPauseBtn.addEventListener('click', togglePlay);

        async function pollMetadata() {
            try {
                const r = await fetch('/api/nowplaying');
                const d = await r.json();
                if (d) {
                    if (d.title) {
                        nowPlayingTitle.textContent = d.title;
                    }
                    if (d.coverArt && d.coverArt !== logo.jpg) {
                        diskImg.src = d.coverArt;
                    }
                }
            } catch {}
        }
        setInterval(pollMetadata, 20000);

        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const songList = document.getElementById('songList');
        const resultsCount = document.getElementById('resultsCount');
        const selectedSongCard = document.getElementById('selectedSongCard');
        const selSongTitle = document.getElementById('selSongTitle');
        const selSongArtist = document.getElementById('selSongArtist');
        const selSongArt = document.getElementById('selSongArt');
        const changeSongBtn = document.getElementById('changeSongBtn');
        const fromInput = document.getElementById('fromInput');
        const toInput = document.getElementById('toInput');
        const msgInput = document.getElementById('msgInput');
        const charCount = document.getElementById('charCount');
        const submitBtn = document.getElementById('submitBtn');
        const statusMsg = document.getElementById('statusMsg');
        const cooldownFill = document.getElementById('cooldownFill');

        let selectedSong = null;
        let cooldownEnd = parseInt(localStorage.getItem('dedicate_cooldown')) || 0;

        async function searchSongs(query) {
            searchBtn.disabled = true;
            searchBtn.textContent = query.trim() ? 'Searching...' : 'Loading...';
            resultsCount.textContent = 'Loading songs...';
            try {
                const r = await fetch('/api/requests/search?q=' + encodeURIComponent(query));
                const d = await r.json();
                songList.innerHTML = '';
                if (d.songs && d.songs.length > 0) {
                    resultsCount.textContent = d.total + ' song' + (d.total !== 1 ? 's' : '') + ' found';
                    d.songs.forEach(s => {
                        const div = document.createElement('div');
                        div.className = 'song-item' + (selectedSong && selectedSong.requestId === s.requestId ? ' selected' : '');
                        div.innerHTML = `
                            <img src="${s.artUrl || 'logo.jpg'}" alt="" onerror="this.src='logo.jpg'">
                            <div class="info">
                                <div class="title">${escapeHtml(s.title)}</div>
                                <div class="artist">${escapeHtml(s.artist || 'Unknown Artist')}</div>
                            </div>
                            <div class="check"><i class="fa-solid fa-check"></i></div>
                        `;
                        div.addEventListener('click', () => selectSong(s));
                        songList.appendChild(div);
                    });
                } else {
                    resultsCount.textContent = 'No songs found. Try a different search.';
                }
            } catch (err) {
                resultsCount.textContent = 'Search failed. Please try again.';
                songList.innerHTML = '';
            }
            searchBtn.disabled = false;
            searchBtn.innerHTML = '<i class="fa-solid fa-search"></i> Search';
        }

        searchSongs('');

        function selectSong(song) {
            selectedSong = song;
            selSongTitle.textContent = song.title;
            selSongArtist.textContent = song.artist || 'Unknown Artist';
            selSongArt.src = song.artUrl || 'logo.jpg';
            selectedSongCard.style.display = 'flex';
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('selected'));
            const items = songList.querySelectorAll('.song-item');
            for (let i = 0; i < items.length; i++) {
                const title = items[i].querySelector('.title')?.textContent;
                if (title === song.title) { items[i].classList.add('selected'); break; }
            }
            document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        changeSongBtn.addEventListener('click', () => {
            selectedSong = null;
            selectedSongCard.style.display = 'none';
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('selected'));
            document.querySelector('.card').scrollIntoView({ behavior: 'smooth' });
        });

        let searchTimeout;
        searchInput.addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => searchSongs(searchInput.value.trim()), 400);
        });
        searchBtn.addEventListener('click', () => searchSongs(searchInput.value.trim()));

        document.querySelectorAll('.template-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const existing = msgInput.value;
                const prefix = existing ? existing + ' ' : '';
                msgInput.value = prefix + chip.dataset.msg;
                msgInput.dispatchEvent(new Event('input'));
            });
        });

        msgInput.addEventListener('input', () => {
            charCount.textContent = msgInput.value.length;
        });

        function updateCooldown() {
            const now = Date.now();
            if (cooldownEnd > now) {
                const remaining = cooldownEnd - now;
                const pct = Math.max(0, Math.min(100, (remaining / 900000) * 100));
                cooldownFill.style.width = pct + '%';
                submitBtn.disabled = true;
                submitBtn.textContent = 'Wait ' + Math.ceil(remaining / 60000) + 'm...';
                setTimeout(updateCooldown, 1000);
            } else {
                cooldownFill.style.width = '0%';
                submitBtn.disabled = false;
                submitBtn.textContent = '🎤 Send Dedication';
            }
        }
        updateCooldown();

        submitBtn.addEventListener('click', async () => {
            if (!selectedSong) {
                statusMsg.textContent = '⚠️ Please search and select a song first.';
                return;
            }
            const from = fromInput.value.trim() || 'A Listener';
            const to = toInput.value.trim() || 'Loved One';
            const msg = msgInput.value.trim();

            submitBtn.disabled = true;
            submitBtn.textContent = 'Submitting...';
            statusMsg.textContent = '⏳ Sending your dedication...';

            try {
                const r = await fetch('/api/requests/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        requestId: selectedSong.requestId,
                        title: selectedSong.title,
                        artist: selectedSong.artist,
                        nickname: from,
                        recipient: to,
                        message: msg
                    })
                });
                const d = await r.json();
                if (d.success) {
                    statusMsg.innerHTML = '✅ ' + d.message;
                    cooldownEnd = Date.now() + 900000;
                    localStorage.setItem('dedicate_cooldown', cooldownEnd);
                    updateCooldown();
                    fromInput.value = '';
                    toInput.value = '';
                    msgInput.value = '';
                    charCount.textContent = '0';
                    selectedSong = null;
                    selectedSongCard.style.display = 'none';
                    document.querySelectorAll('.song-item').forEach(el => el.classList.remove('selected'));
                } else {
                    statusMsg.textContent = '❌ ' + (d.error || 'Submission failed. Try again.');
                }
            } catch (err) {
                statusMsg.textContent = '❌ Network error. Please try again.';
            }
            submitBtn.disabled = false;
            setTimeout(() => { if (!submitBtn.disabled) submitBtn.textContent = '🎤 Send Dedication'; }, 1000);
        });

        const savedNick = localStorage.getItem('chat_username');
        if (savedNick) fromInput.value = savedNick;
        fromInput.addEventListener('change', () => {
            if (fromInput.value.trim()) localStorage.setItem('chat_username', fromInput.value.trim());
        });

        function escapeHtml(str) {
            const el = document.createElement('div');
            el.textContent = str;
            return el.innerHTML;
        }
    </script>
</body>
</html>
