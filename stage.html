<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIVE STAGE | HELLO MACHI SUPER SINGER</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #FF1493;
            --gold: #FFD700;
            --bg-dark: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-dark);
            color: white;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: fixed;
        }

        /* --- REALISTIC TROPHY --- */
        .trophy-container {
            position: absolute;
            top: 50%; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 4%; transform: translateY(-50%);
            z-index: 10; pointer-events: none;
        }
        .oscar-momento {
            position: relative; width: 280px; height: 500px;
            display: flex; flex-direction: column; align-items: center;
        }
        .oscar-img {
            width: 100%; height: 100%; object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.4));
        }
        .oscar-logo-overlay {
            position: absolute;
            top: 65px; /* Adjust based on image frame position */
            width: 85px; height: 85px;
            border-radius: 50%; overflow: hidden;
            border: 2px solid #FFD700;
            box-shadow: 0 0 15px #FFD700;
        }
        .oscar-logo-overlay img { width: 100%; height: 100%; object-fit: cover; }

        /* --- VOTE OVERLAY --- */
        #qr-overlay {
            position: fixed; inset: 0;
            background: radial-gradient(circle at center, rgba(15,0,35,0.99), #000);
            z-index: 25000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            animation: fadeIn 0.6s ease;
        }
        .vote-header {
            font-size: clamp(3rem, 8vw, 6.5rem); font-weight: 900; letter-spacing: 12px;
            background: linear-gradient(to bottom, #FFD700, #fff, #B8860B);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 40px; text-shadow: 0 0 50px rgba(255,215,0,0.6);
            animation: textPulse 2s infinite alternate;
        }
        @keyframes textPulse { from{opacity:0.8} to{opacity:1; transform:scale(1.02)} }
        .qr-frame {
            padding: clamp(20px, 4vw, 50px); background: #fff; border-radius: 40px;
            box-shadow: 0 0 150px rgba(255,215,0,0.6);
            animation: qrZoom 3s infinite ease-in-out;
        }
        @keyframes qrZoom { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .qr-frame img { width: clamp(250px, 50vw, 450px); height: clamp(250px, 50vw, 450px); }
        .vote-instruction {
            margin-top: 40px; font-size: clamp(1.2rem, 3vw, 2.5rem); color: #FFD700;
            font-weight: 900; letter-spacing: 3px; text-align: center;
        }

        /* --- STAGE BACKGROUND --- */
        .stage-world {
            position: fixed; inset: 0; z-index: 1;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #000 100%);
        }
        .spotlight {
            position: absolute; width: 40vw; height: 100vh;
            background: linear-gradient(to top, rgba(255, 20, 147, 0.15), transparent);
            top: 0; transform-origin: top center;
            animation: sweep 8s infinite alternate ease-in-out;
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
            opacity: 0.6;
        }
        @keyframes sweep { from{transform:rotate(-25deg)} to{transform:rotate(25deg)} }
        .particle { position: absolute; background: var(--primary); border-radius: 50%; filter: blur(5px); opacity: 0.3; animation: float-up linear infinite; }
        @keyframes float-up { 0%{transform:translateY(100vh) scale(1);opacity:0} 50%{opacity:0.4} 100%{transform:translateY(-100px) scale(1.5);opacity:0} }

        /* --- MAIN CONTENT --- */
        .stage-main { position: relative; z-index: 5; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .singer-frame {
            position: relative; width: clamp(250px, 60vh, 500px); height: clamp(250px, 60vh, 500px);
            border-radius: 50%; border: 8px solid white; box-shadow: 0 0 60px var(--primary);
            overflow: hidden; background: #222; z-index: 10;
        }
        .singer-img { width: 100%; height: 100%; object-fit: cover; animation: kenburns 20s infinite alternate ease-in-out; }
        @keyframes kenburns { from{transform:scale(1)} to{transform:scale(1.3)} }

        .lower-thirds {
            position: absolute; bottom: 8%; width: 90%; max-width: 900px;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(25px);
            border: 2px solid var(--primary); padding: 20px 40px; border-radius: 30px;
            display: flex; flex-direction: column; align-items: center; text-align: center; z-index: 100;
        }
        .singer-info h2 { 
            font-size: clamp(2rem, 5vw, 3.8rem); margin-bottom: 5px; text-transform: uppercase;
            background: linear-gradient(to bottom, #FFD700 0%, #FFFACD 50%, #B8860B 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255, 215, 0, 0.6)); font-weight: 900;
        }
        .round-text { font-size: 1.1rem; color: var(--primary); letter-spacing: 6px; font-weight: 700; text-transform: uppercase; margin-bottom: 5px; }

        .shoutout-ticker {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(0, 0, 0, 0.9); border-top: 3px solid var(--primary);
            padding: 12px 0; white-space: nowrap; overflow: hidden; z-index: 1000;
        }
        .ticker-content { display: inline-block; padding-left: 100%; animation: ticker 40s linear infinite; font-size: 1.3rem; font-weight: 700; color: var(--primary); }
        @keyframes ticker { 0%{transform:translate3d(0,0,0)} 100%{transform:translate3d(-100%,0,0)} }
        .shoutout-item { display: inline-block; margin-right: 60px; }
        .shoutout-item span { color: white; margin-left: 12px; font-weight: 400; text-transform: none; }

        /* --- SCORE OVERLAY --- */
        #score-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.96); z-index: 20000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .score-row {
            display: flex; justify-content: space-between; align-items: center;
            width: 85%; max-width: 800px; background: rgba(255,255,255,0.04);
            margin-bottom: 18px; padding: 18px 35px; border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .final-score-val { font-size: 7.5rem; font-weight: 900; background: linear-gradient(to bottom, #FFD700, #B8860B); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        @media (max-width: 768px) {
            .trophy-container { display: none; }
            .singer-frame { width: 60vw; height: 60vw; margin-top: -10vh; }
            .lower-thirds { padding: 15px; border-radius: 20px; }
            .vote-header { font-size: 2.5rem; letter-spacing: 4px; }
            .qr-frame img { width: 70vw; height: 70vw; }
        }
        @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    </style>
</head>
<body>

    <div id="qr-overlay">
        <div class="vote-header">VOTE FOR ME</div>
        <div class="qr-frame">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=https://hello-machi-fm-6ebe4.web.app/vote.html" alt="Vote QR">
        </div>
        <div id="qr-singer-name" class="vote-instruction">FOR THE CURRENT PERFORMER</div>
        <p style="margin-top:20px; color:#aaa; font-size:1.2rem; letter-spacing:1px;">OPEN CAMERA TO SCAN & VOTE</p>
    </div>

    <div id="stage-overlay" style="position:fixed; inset:0; background:#000; z-index:30000; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 style="color:#FFD700; margin-bottom:40px; letter-spacing:8px; font-size:3rem;">HELLO MACHI STAGE</h1>
        <button onclick="startStage()" style="background:var(--primary); color:white; border:none; padding:20px 60px; font-size:1.8rem; font-weight:900; border-radius:50px; cursor:pointer; box-shadow:0 0 30px var(--primary);">ENTER THE STAGE</button>
    </div>

    <div id="score-overlay">
        <h2 id="score-overlay-title" style="color:#FFD700; font-size:3rem; margin-bottom:40px;">LIVE SCORING</h2>
        <div id="judge-scores-container" style="width:100%; display:flex; flex-direction:column; align-items:center;"></div>
        <div id="audience-score-container" class="score-row" style="border-color:var(--primary); margin-top:30px;">
            <div style="font-size:1.8rem; color:var(--primary);">Audience Vote</div>
            <div id="audience-score-val" style="font-size:3rem; font-weight:900;">0.0</div>
        </div>
        <div id="final-score-container" style="text-align:center; margin-top:40px;">
            <div style="font-size:1.5rem; color:#888; letter-spacing:5px;">FINAL SCORE</div>
            <div id="final-score-val" class="final-score-val">0.00</div>
        </div>
    </div>

    <div class="stage-world">
        <div class="spotlight" style="left: 10%; animation-delay: 0s;"></div>
        <div class="spotlight" style="left: 45%; animation-delay: -4s; opacity: 0.4;"></div>
        <div class="spotlight" style="left: 80%; animation-delay: -2s;"></div>
    </div>

    <div class="stage-main" id="stage-ui" style="display: none;">
        <div class="trophy-container">
            <div class="oscar-momento">
                <img src="premium_oscar_trophy_1777125697325.png" class="oscar-img">
                <div class="oscar-logo-overlay"><img src="logo.jpg"></div>
            </div>
            <div class="oscar-momento" style="transform: scaleX(-1);">
                <img src="premium_oscar_trophy_1777125697325.png" class="oscar-img">
                <!-- Inner logo un-mirrored -->
                <div class="oscar-logo-overlay" style="transform: scaleX(-1);"><img src="logo.jpg"></div>
            </div>
        </div>

        <div class="singer-frame">
            <img src="logo.jpg" class="singer-img" id="singer-photo">
        </div>

        <div class="lower-thirds">
            <div id="current-round" class="round-text">LIVE PERFORMANCE</div>
            <h2 id="singer-name">HELLO MACHI FM</h2>
            <div id="singer-place" style="color:#00f2ff; font-weight:700; letter-spacing:2px;">SUPER SINGER SEASON 1</div>
        </div>
    </div>

    <div class="shoutout-ticker">
        <div id="ticker-content" class="ticker-content">WELCOME TO HELLO MACHI SUPER SINGER 2026!</div>
    </div>

    <audio id="live-audio" src="https://azuracast.hellomachi.com/listen/hello_machi_fm/radio.mp3" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.9.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        let currentSinger1Id = null;
        let votingWasOpen = false;

        function startStage() {
            document.getElementById('stage-overlay').style.display = 'none';
            document.getElementById('stage-ui').style.display = 'flex';
            document.getElementById('live-audio').play().catch(e => console.log("Audio blocked"));
            createParticles();
            initLiveSync();
        }

        function createParticles() {
            const world = document.querySelector('.stage-world');
            for(let i=0; i<40; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 20 + 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.animationDuration = Math.random() * 5 + 5 + 's';
                p.style.animationDelay = Math.random() * 5 + 's';
                world.appendChild(p);
            }
        }

        function initLiveSync() {
            db.collection('live_state').doc('current').onSnapshot(async (doc) => {
                if (doc.exists) {
                    const data = doc.data();
                    if (data.singer1 !== currentSinger1Id) { currentSinger1Id = data.singer1; }
                    
                    document.getElementById('current-round').textContent = data.round || 'LIVE PERFORMANCE';
                    
                    // Vote Overlay Logic
                    const voteOverlay = document.getElementById('qr-overlay');
                    if (data.votingOpen) {
                        voteOverlay.style.display = 'flex';
                    } else {
                        voteOverlay.style.display = 'none';
                    }

                    if (data.singer1) {
                        const sSnap = await db.collection('participants').doc(data.singer1).get();
                        if (sSnap.exists) {
                            const s = sSnap.data();
                            document.getElementById('singer-name').textContent = s.name.toUpperCase();
                            document.getElementById('qr-singer-name').textContent = `FOR ${s.name.toUpperCase()}`;
                            document.getElementById('singer-place').textContent = s.place ? `FROM ${s.place.toUpperCase()}` : "LIVE PARTICIPANT";
                            if (s.photoBase64) document.getElementById('singer-photo').src = s.photoBase64;
                        }
                    }

                    // Score Logic
                    const scoreOverlay = document.getElementById('score-overlay');
                    if (data.scoreRevealStep && data.scoreRevealStep !== 0) {
                        scoreOverlay.style.display = 'flex';
                        renderScores(data.scoreRevealStep, data.scoreRevealSingerId || data.singer1);
                    } else {
                        scoreOverlay.style.display = 'none';
                    }
                }
            });

            db.collection('shoutouts').orderBy('timestamp', 'desc').limit(8).onSnapshot(snap => {
                let tickerHtml = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    tickerHtml += `<div class="shoutout-item">TO ${d.to}: <span>${d.message}</span></div>`;
                });
                if (tickerHtml) document.getElementById('ticker-content').innerHTML = tickerHtml;
            });
        }

        async function renderScores(step, singerId) {
            const jContainer = document.getElementById('judge-scores-container');
            const aContainer = document.getElementById('audience-score-container');
            const fContainer = document.getElementById('final-score-container');

            let jScores = {};
            try {
                const jDoc = await db.collection('judge_scores').doc(singerId).get();
                if (jDoc.exists) jScores = jDoc.data().scores || {};
            } catch(e) {}

            let aScore = 0;
            try {
                const aSnap = await db.collection('live_votes').where('singerId', '==', singerId).get();
                let vSum = 0;
                aSnap.forEach(d => vSum += d.data().score || 0);
                aScore = aSnap.size > 0 ? (vSum / aSnap.size) : 0;
            } catch(e) {}

            const judges = Object.keys(jScores);
            let html = '';
            for (let i = 0; i < step && i < judges.length; i++) {
                html += `<div class="score-row" style="opacity:1; transform:scale(1);"><div class="score-name">${judges[i]}</div><div class="score-val">${jScores[judges[i]].toFixed(1)}</div></div>`;
            }
            jContainer.innerHTML = html;

            if (step === 'audience' || step === 'final') {
                aContainer.style.display = 'flex';
                document.getElementById('audience-score-val').textContent = aScore.toFixed(1);
            } else { aContainer.style.display = 'none'; }

            if (step === 'final') {
                fContainer.style.display = 'block';
                const jAvg = judges.length > 0 ? (judges.reduce((a,b)=>a+jScores[b],0)/judges.length) : 0;
                const final = (jAvg * 0.6) + (aScore * 0.4);
                document.getElementById('final-score-val').textContent = final.toFixed(2);
            } else { fContainer.style.display = 'none'; }
        }
    </script>
</body>
</html>
